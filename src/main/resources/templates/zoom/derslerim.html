<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
  <link rel="icon" type="image/png" th:href="@{/images/gazi-logo.png}">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canlı Derslerim | Gazi Üniversitesi</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    .meeting-card {
      display:flex; align-items:flex-start; gap:1.25rem;
      padding:1.25rem 1.5rem; border:1px solid var(--border);
      border-radius:12px; background:var(--bg);
      transition: border-color 0.15s, box-shadow 0.15s;
      margin-bottom:0.75rem;
    }
    .meeting-card:hover { border-color:var(--primary-300); box-shadow:0 2px 12px rgba(0,0,0,0.06); }
    .meeting-card.live { border-color:#2b8a3e; background:#f0fdf4; }
    .meet-icon {
      width:48px; height:48px; border-radius:12px;
      background:var(--primary-100); color:var(--primary-600);
      display:flex; align-items:center; justify-content:center;
      font-size:1.3rem; flex-shrink:0;
    }
    .meet-icon.live-icon { background:#dcfce7; color:#16a34a; }
    .live-pulse {
      display:inline-flex; align-items:center; gap:5px;
      background:#2b8a3e; color:#fff; font-size:0.72rem;
      font-weight:700; padding:2px 9px; border-radius:20px;
    }
    .live-dot { width:7px; height:7px; border-radius:50%; background:#fff; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<section class="page-header">
  <div class="container">
    <div class="breadcrumb">
      <a th:href="@{/panom}">Panom</a>
      <span class="separator">›</span>
      <span class="current">Canlı Derslerim</span>
    </div>
    <h1><i class="bi bi-camera-video-fill"></i> Yaklaşan Canlı Derslerim</h1>
  </div>
</section>

<section class="section">
  <div class="container" style="max-width:760px;">

    <!-- Boş durum -->
    <div th:if="${#lists.isEmpty(meetings)}"
         style="padding:4rem;text-align:center;color:var(--text-muted);">
      <i class="bi bi-camera-video" style="font-size:3rem;display:block;margin-bottom:1rem;color:var(--gray-300);"></i>
      <p>Yaklaşan canlı dersiniz bulunmuyor.</p>
      <a th:href="@{/egitimler}" class="btn btn-primary" style="margin-top:1rem;">Eğitimlere Göz At</a>
    </div>

    <!-- Toplantı listesi -->
    <div th:if="${!#lists.isEmpty(meetings)}">
      <div th:each="m : ${meetings}" th:classappend="${m.live} ? ' live'" class="meeting-card">

        <div th:classappend="${m.live} ? ' live-icon'" class="meet-icon">
          <i class="bi bi-camera-video-fill"></i>
        </div>

        <div style="flex:1;min-width:0;">
          <!-- Kurs & Konu -->
          <div style="font-size:0.78rem;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:0.2rem;"
               th:text="${m.courseTitle}">Kurs</div>
          <div style="display:flex;align-items:center;gap:0.6rem;flex-wrap:wrap;margin-bottom:0.5rem;">
            <span style="font-weight:700;font-size:1rem;" th:text="${m.topic}">Konu</span>
            <span th:if="${m.live}" class="live-pulse"><span class="live-dot"></span> CANLI</span>
          </div>

          <!-- Meta -->
          <div style="display:flex;gap:1.25rem;flex-wrap:wrap;font-size:0.84rem;color:var(--text-muted);margin-bottom:0.75rem;">
            <span><i class="bi bi-calendar-event"></i>
              <span th:text="${#temporals.format(m.scheduledAt, 'dd.MM.yyyy HH:mm')}">-</span>
            </span>
            <span><i class="bi bi-clock"></i> <span th:text="${m.durationMinutes}">0</span> dk</span>
            <span th:if="${m.password != null and !#strings.isEmpty(m.password)}">
              <i class="bi bi-lock-fill"></i> Şifre: <code th:text="${m.password}">-</code>
            </span>
          </div>

          <!-- Katıl butonu -->
          <a th:href="@{/zoom/toplanti/{id}/katil(id=${m.id})}" class="btn btn-primary"
             style="font-size:0.88rem;padding:0.45rem 1.1rem;">
            <i class="bi bi-box-arrow-up-right"></i>
            <span th:text="${m.live} ? 'Hemen Katıl' : 'Derse Katıl'">Derse Katıl</span>
          </a>
        </div>
      </div>
    </div>

  </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
