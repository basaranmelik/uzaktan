<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
  <link rel="icon" type="image/png" th:href="@{/images/gazi-logo.png}">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yetkisiz Erişim | Gazi Üniversitesi</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<section class="section" style="min-height:60vh;display:flex;align-items:center;">
  <div class="container text-center">
    <div style="font-size:5rem;margin-bottom:1rem;color:#e03131;"><i class="bi bi-shield-lock-fill"></i></div>
    <h1 style="font-size:5rem;color:#e03131;margin-bottom:0.5rem;">403</h1>
    <h2>Yetkisiz Erişim</h2>
    <p th:if="${message != null}" style="color:var(--text-muted);margin:0.5rem 0;" th:text="${message}">Hata mesajı</p>
    <p style="color:var(--text-muted);margin:0.5rem 0 2rem;">Bu sayfaya erişim yetkiniz bulunmamaktadır.</p>
    <a th:href="@{/}" class="btn btn-primary btn-lg">Ana Sayfaya Dön</a>
  </div>
</section>
<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
