<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
  <link rel="icon" type="image/png" th:href="@{/images/gazi-logo.png}">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${course.title} + ' — Eğitim İçeriği | GUZEM'">Eğitim İçeriği</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    /* ── Page wrapper — navbar altına itir ── */
    .izle-page {
      margin-top: var(--nav-height);
      min-height: calc(100vh - var(--nav-height));
      background: #f8fafc;
    }

    /* ── Breadcrumb bar ── */
    .izle-topbar {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      padding: 0.85rem 0;
    }
    .izle-topbar .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .izle-breadcrumb {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.82rem;
      color: #64748b;
    }
    .izle-breadcrumb a {
      color: #64748b;
      text-decoration: none;
      transition: color 0.15s;
    }
    .izle-breadcrumb a:hover { color: #1e40af; }
    .izle-breadcrumb .sep { color: #cbd5e1; }
    .izle-breadcrumb .cur { color: #1e293b; font-weight: 600; }

    /* ── Main layout ── */
    .izle-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.5rem 1rem;
    }

    .izle-layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 1.5rem;
      align-items: start;
    }
    @media (max-width: 900px) {
      .izle-layout {
        grid-template-columns: 1fr;
      }
    }

    /* ── Sidebar ── */
    .izle-sidebar {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      overflow: hidden;
      position: sticky;
      top: calc(var(--nav-height) + 1.5rem);
    }
    .izle-sidebar-head {
      padding: 1.25rem;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
    }
    .izle-sidebar-head h3 {
      font-size: 0.95rem;
      font-weight: 700;
      color: #0f172a;
      margin: 0 0 0.25rem;
      line-height: 1.4;
    }
    .izle-sidebar-head .instructor-name {
      font-size: 0.78rem;
      color: #64748b;
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }

    /* Progress */
    .izle-progress {
      padding: 0 1.25rem 1rem;
      margin-top: 0.75rem;
    }
    .izle-progress-info {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: #64748b;
      margin-bottom: 0.4rem;
    }
    .izle-progress-bar {
      height: 6px;
      background: #e2e8f0;
      border-radius: 99px;
      overflow: hidden;
    }
    .izle-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #2563eb, #1d4ed8);
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    /* Video list */
    .izle-video-list {
      max-height: 420px;
      overflow-y: auto;
    }
    .izle-video-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1.15rem;
      border-bottom: 1px solid #f1f5f9;
      text-decoration: none;
      color: #334155;
      transition: background 0.15s;
      font-size: 0.85rem;
    }
    .izle-video-item:last-child { border-bottom: none; }
    .izle-video-item:hover { background: #f8fafc; }
    .izle-video-num {
      min-width: 28px;
      height: 28px;
      border-radius: 6px;
      background: #f1f5f9;
      color: #64748b;
      font-size: 0.72rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .izle-video-title {
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 500;
    }
    .izle-video-check {
      color: #16a34a;
      font-size: 0.9rem;
      flex-shrink: 0;
    }

    /* ── Main content ── */
    .izle-main {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      overflow: hidden;
    }
    .izle-main-header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .izle-main-header h2 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #0f172a;
      margin: 0;
    }
    .izle-main-header .lesson-count {
      font-size: 0.78rem;
      color: #64748b;
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }

    /* Center prompt */
    .izle-prompt {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem 2rem;
      min-height: 400px;
    }
    .izle-prompt-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #eff6ff;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.5rem;
    }
    .izle-prompt-icon i {
      font-size: 2rem;
      color: #2563eb;
    }
    .izle-prompt h3 {
      font-size: 1.15rem;
      font-weight: 700;
      color: #0f172a;
      margin: 0 0 0.5rem;
    }
    .izle-prompt p {
      font-size: 0.9rem;
      color: #64748b;
      margin: 0 0 1.75rem;
      max-width: 360px;
      line-height: 1.5;
    }

    /* CTA button */
    .izle-cta {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 1.75rem;
      border-radius: 8px;
      background: #1e40af;
      color: #fff;
      font-weight: 700;
      font-size: 0.9rem;
      text-decoration: none;
      transition: background 0.2s;
      border: none;
      cursor: pointer;
    }
    .izle-cta:hover { background: #1e3a8a; color: #fff; }

    /* Completed badge */
    .izle-completed {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      background: #f0fdf4;
      border: 1px solid #86efac;
      color: #166534;
      font-size: 0.95rem;
      font-weight: 700;
    }

    /* Flash */
    .izle-flash {
      background: #f0fdf4;
      border: 1px solid #86efac;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      margin-bottom: 1.25rem;
      color: #166534;
      font-weight: 600;
      font-size: 0.88rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* Back button */
    .izle-back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.4rem 0.85rem;
      border-radius: 6px;
      background: #f1f5f9;
      color: #475569;
      font-size: 0.82rem;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.15s;
      border: 1px solid #e2e8f0;
    }
    .izle-back-btn:hover { background: #e2e8f0; color: #1e293b; }
  </style>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="izle-page">

  <!-- Breadcrumb bar -->
  <div class="izle-topbar">
    <div class="container">
      <nav class="izle-breadcrumb">
        <a th:href="@{/panom}"><i class="bi bi-house-fill"></i> Panom</a>
        <span class="sep">/</span>
        <a th:href="@{/egitimler/{id}(id=${course.id})}" th:text="${course.title}">Kurs</a>
        <span class="sep">/</span>
        <span class="cur">Eğitim İçeriği</span>
      </nav>
      <a th:href="@{/egitimler/{id}(id=${course.id})}" class="izle-back-btn">
        <i class="bi bi-arrow-left"></i> Kurs Bilgileri
      </a>
    </div>
  </div>

  <!-- Main content -->
  <div class="izle-container">

    <!-- Flash -->
    <div th:if="${successMessage}" class="izle-flash">
      <i class="bi bi-check-circle-fill"></i> <span th:text="${successMessage}"></span>
    </div>

    <div class="izle-layout">

      <!-- SOL: Sidebar -->
      <div class="izle-sidebar">
        <div class="izle-sidebar-head">
          <h3 th:text="${course.title}">Kurs Adi</h3>
          <div th:if="${course.instructorName != null}" class="instructor-name">
            <i class="bi bi-person-workspace"></i>
            <span th:text="${course.instructorName}">Egitmen</span>
          </div>
        </div>

        <!-- Progress -->
        <div th:if="${enrollment != null and enrollment.progressPercentage != null}" class="izle-progress">
          <div class="izle-progress-info">
            <span>Ilerleme</span>
            <span th:text="${enrollment.progressPercentage} + '%'">0%</span>
          </div>
          <div class="izle-progress-bar">
            <div class="izle-progress-fill"
                 th:style="'width:' + ${enrollment.progressPercentage} + '%'"></div>
          </div>
        </div>

        <!-- Video list -->
        <div class="izle-video-list">
          <a th:each="v : ${videos}"
             th:href="@{/videolar/{id}(id=${v.id})}"
             class="izle-video-item">
            <div class="izle-video-num" th:text="${v.orderIndex}">1</div>
            <span class="izle-video-title" th:text="${v.title}">Video Basligi</span>
            <i th:if="${v.watched}" class="bi bi-check-circle-fill izle-video-check"></i>
          </a>
        </div>
      </div>

      <!-- SAG: Ana icerik -->
      <div class="izle-main">
        <div class="izle-main-header">
          <h2 th:text="${course.title}">Kurs Adi</h2>
          <div class="lesson-count">
            <i class="bi bi-collection-play"></i>
            <span th:text="${#lists.size(videos)} + ' ders'">0 ders</span>
          </div>
        </div>

        <div class="izle-prompt">
          <div class="izle-prompt-icon">
            <i class="bi bi-play-circle"></i>
          </div>
          <h3>Izlemeye Baslayin</h3>
          <p>Sol taraftaki listeden bir ders secerek izlemeye baslayabilirsiniz.</p>

          <!-- Kaldigim yerden devam et -->
          <a th:if="${firstUnwatched != null}"
             th:href="@{/videolar/{id}(id=${firstUnwatched.id})}"
             class="izle-cta">
            <i class="bi bi-play-fill"></i>
            <span th:text="'Devam Et: ' + ${firstUnwatched.title}">Devam Et</span>
          </a>

          <!-- Tum videolar tamamlandiysa -->
          <div th:if="${allWatched}" class="izle-completed">
            <i class="bi bi-trophy-fill"></i> Tum dersler tamamlandi!
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
