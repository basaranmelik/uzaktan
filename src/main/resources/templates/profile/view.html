<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
  <link rel="icon" type="image/png" th:href="@{/images/gazi-logo.png}">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profilim | Gazi Üniversitesi</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}" th:with="activeMenu='profile'"></div>

<section class="page-header">
  <div class="container">
    <h1>Profilim</h1>
    <p>Kişisel bilgilerinizi ve sertifikalarınızı yönetin.</p>
  </div>
</section>

<section class="section">
  <div class="container">

    <!-- Flash mesajı -->
    <div th:if="${successMessage}"
         style="background:#d3f9d8;border:1px solid #69db7c;border-radius:8px;padding:1rem;margin-bottom:1.5rem;color:#2b8a3e;font-weight:600;">
      <i class="bi bi-check-circle-fill"></i> <span th:text="${successMessage}"></span>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:2rem;">

      <!-- Sol: Bilgi gösterimi -->
      <div class="card fade-in" style="padding:2rem;">
        <h3 style="margin-bottom:1.5rem;">Bilgilerim</h3>
        <div style="display:flex;flex-direction:column;gap:0.75rem;">
          <div style="display:flex;gap:1rem;">
            <span style="color:var(--text-muted);min-width:120px;">Ad Soyad</span>
            <strong th:text="${user.fullName}">Ad Soyad</strong>
          </div>

          <div style="display:flex;gap:1rem;">
            <span style="color:var(--text-muted);min-width:120px;">E-posta</span>
            <strong th:text="${user.email}">email</strong>
          </div>
          <div style="display:flex;gap:1rem;" th:if="${user.phoneNumber != null}">
            <span style="color:var(--text-muted);min-width:120px;">Telefon</span>
            <strong th:text="${user.phoneNumber}">telefon</strong>
          </div>
          <div style="display:flex;gap:1rem;" th:if="${user.city != null}">
            <span style="color:var(--text-muted);min-width:120px;">Şehir</span>
            <strong th:text="${user.city}">şehir</strong>
          </div>
          <div style="display:flex;gap:1rem;" th:if="${user.birthDate != null}">
            <span style="color:var(--text-muted);min-width:120px;">Doğum Tarihi</span>
            <strong th:text="${#temporals.format(user.birthDate, 'dd.MM.yyyy')}">Tarih</strong>
          </div>
          <div style="display:flex;gap:1rem;">
            <span style="color:var(--text-muted);min-width:120px;">Kayıt Tarihi</span>
            <strong th:text="${#temporals.format(user.createdAt, 'dd.MM.yyyy')}">Tarih</strong>
          </div>
        </div>
      </div>

      <!-- Sağ: Güncelleme formu -->
      <div class="card fade-in" style="padding:2rem;">
        <h3 style="margin-bottom:1.5rem;">Bilgileri Güncelle</h3>
        <form th:action="@{/profilim/guncelle}" th:object="${profileUpdateRequest}" method="post">

          <div class="form-row">
            <div class="form-group">
              <label>Ad</label>
              <input type="text" th:field="*{firstName}" class="form-control"
                     th:classappend="${#fields.hasErrors('firstName')} ? ' is-invalid'"
                     th:placeholder="${user.firstName}">
              <div class="invalid-feedback" th:errors="*{firstName}" th:if="${#fields.hasErrors('firstName')}"></div>
            </div>
            <div class="form-group">
              <label>Soyad</label>
              <input type="text" th:field="*{lastName}" class="form-control"
                     th:classappend="${#fields.hasErrors('lastName')} ? ' is-invalid'"
                     th:placeholder="${user.lastName}">
              <div class="invalid-feedback" th:errors="*{lastName}" th:if="${#fields.hasErrors('lastName')}"></div>
            </div>
          </div>

          <div class="form-group">
            <label>E-posta</label>
            <input type="email" th:field="*{email}" class="form-control"
                   th:placeholder="${user.email}">
          </div>

          <div class="form-group">
            <label>Telefon</label>
            <input type="tel" th:field="*{phoneNumber}" class="form-control"
                   th:placeholder="${user.phoneNumber}">
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Şehir</label>
              <input type="text" th:field="*{city}" class="form-control">
            </div>
            <div class="form-group">
              <label>İlçe</label>
              <input type="text" th:field="*{district}" class="form-control">
            </div>
          </div>

          <button type="submit" class="btn btn-primary" style="width:100%;">Kaydet</button>
        </form>
      </div>

    </div>

    <!-- Sertifikalar -->
    <div style="margin-top:2.5rem;" th:if="${!#lists.isEmpty(certificates)}">
      <h3 style="margin-bottom:1.5rem;"><i class="bi bi-trophy-fill"></i> Sertifikalarım</h3>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem;">
        <div th:each="cert : ${certificates}"
             class="card fade-in"
             style="padding:1.5rem;border-left:4px solid var(--primary-500);">
          <div style="font-size:0.85rem;color:var(--text-muted);margin-bottom:0.5rem;">
            <i class="bi bi-award"></i> Sertifika
          </div>
          <h4 th:text="${cert.courseTitle}">Kurs Adı</h4>
          <div style="font-size:0.85rem;color:var(--text-muted);margin-top:0.5rem;">
            <div>Kod: <strong th:text="${cert.certificateCode}">KOD</strong></div>
            <div>Tarih: <strong th:text="${#temporals.format(cert.issueDate, 'dd.MM.yyyy')}">Tarih</strong></div>
          </div>
          <a th:href="@{/sertifika/dogrula/{code}(code=${cert.certificateCode})}"
             class="btn btn-secondary"
             style="margin-top:1rem;font-size:0.85rem;">
            Sertifikayı Doğrula →
          </a>
        </div>
      </div>
    </div>

  </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const phoneInput = document.getElementById("phoneNumber");
            if (phoneInput) {
                if(!phoneInput.value.startsWith('+90 ')) {
                    phoneInput.value = '+90 ';
                }
                phoneInput.addEventListener('input', function (e) {
                    let input = phoneInput.value.replace(/\D/g, ''); 
                    if(input.length === 0) {
                        phoneInput.value = '+90 ';
                        return;
                    }
                    if(!input.startsWith('90')) {
                        input = '90' + input;
                    }
                    if(input.length > 12) input = input.substring(0, 12);
                    
                    let formatted = '+90 ';
                    if (input.length > 2) formatted += input.substring(2, 5);
                    if (input.length > 5) formatted += ' ' + input.substring(5, 8);
                    if (input.length > 8) formatted += ' ' + input.substring(8, 10);
                    if (input.length > 10) formatted += ' ' + input.substring(10, 12);
                    
                    phoneInput.value = formatted;
                });
                phoneInput.addEventListener('keydown', function(e) {
                    if (e.key === 'Backspace' && phoneInput.value.length <= 4) {
                        e.preventDefault();
                    }
                });
            }
        });
    </script>
</body>
</html>
