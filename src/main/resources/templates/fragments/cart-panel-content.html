<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
  <th:block th:fragment="cartPanelInner">
    <div class="nav-panel-head">
      <span style="color:var(--primary-600);font-weight:700;"><i class="bi bi-cart3" style="margin-right:0.4rem;color:var(--primary-500);"></i>Sepetim</span>
      <span class="nav-panel-count"
            th:text="${cartCount} + ' kurs'">0 kurs</span>
    </div>
    <div th:if="${cartCount > 0}">
      <div class="nav-panel-body">
        <div th:each="item : ${cartItems}" class="nav-cart-item"
             th:data-course-id="${item.courseId}">
          <div class="nav-cart-thumb"><i class="bi bi-play-circle"></i></div>
          <div class="nav-cart-info">
            <a th:href="@{/egitimler/{id}(id=${item.courseId})}" class="nav-cart-title" style="text-decoration:none; display:block;" th:text="${item.courseTitle}">Kurs</a>
            <div class="nav-cart-price"
                 th:text="${item.price != null and item.price.signum() > 0} ? |₺${#numbers.formatDecimal(item.price, 1, 'POINT', 0, 'COMMA')}| : 'Ücretsiz'">
              ₺0
            </div>
            <small th:if="${item.price != null and item.price.signum() > 0}"
                   style="font-size:0.62rem;color:var(--text-muted);">(KDV dahil)</small>
          </div>
          <button class="nav-cart-remove" title="Kaldır" th:data-id="${item.courseId}">
            <i class="bi bi-x-lg"></i>
          </button>
        </div>
      </div>
      <div class="nav-panel-footer">
        <span>Toplam:
          <strong style="color:var(--primary-600);"
                  th:text="|₺${#numbers.formatDecimal(cartTotal, 1, 'POINT', 0, 'COMMA')}|">₺0</strong>
          <small th:if="${cartTotal != null and cartTotal.signum() > 0}"
                 style="font-size:0.6rem;color:var(--text-muted);margin-left:0.2rem;">(KDV dahil)</small>
        </span>
        <a th:href="@{/sepet}" class="btn btn-primary"
           style="padding:0.4rem 1rem;font-size:0.82rem;border-radius:8px; display:block; text-align:center; margin-bottom: 0.5rem;">
          Ödemeye Geç
        </a>
        <form th:action="@{/sepet/checkout}" method="post" style="margin:0;">
          <button type="submit" class="btn btn-primary" style="padding:0.4rem 1rem;font-size:0.82rem;border-radius:8px; display:block; width:100%; text-align:center; background:#0f172a; border-color:#0f172a;">
             <i class="bi bi-robot"></i> (Test) Kayıt Ol
          </button>
        </form>
      </div>
    </div>
    <div th:if="${cartCount == 0}"
         style="padding:2rem;text-align:center;color:var(--text-muted);">
      <i class="bi bi-cart3" style="font-size:2rem;display:block;margin-bottom:0.5rem;color:var(--gray-300);"></i>
      <div style="font-size:0.85rem;">Sepetiniz boş</div>
      <a th:href="@{/egitimler}"
         style="font-size:0.82rem;color:var(--primary-600);font-weight:600;margin-top:0.5rem;display:inline-block;">
        Eğitimlere Göz At
      </a>
    </div>
  </th:block>
</body>
</html>
