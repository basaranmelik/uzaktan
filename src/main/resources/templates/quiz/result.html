<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
  <link rel="icon" type="image/png" th:href="@{/images/gazi-logo.png}">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${course.title} + ' — Sınav Sonucu | GUZEM'">Sınav Sonucu</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="result-page">
  <div class="container" style="max-width: 800px;">

    <!-- Sonuç Hero -->
    <div class="result-hero" th:classappend="${result.passed} ? 'passed' : 'failed'">
      <div class="result-hero-icon">
        <i th:class="${result.passed} ? 'bi bi-trophy-fill' : 'bi bi-emoji-frown-fill'"></i>
      </div>
      <h1 th:text="${result.passed} ? 'Tebrikler!' : 'Maalesef Başarısız'"></h1>
      <p th:text="${result.passed} ? 'Sınavı başarıyla geçtiniz ve sertifikanız oluşturuldu!' : 'Bu sefer olmadı ama tekrar deneyebilirsiniz.'"></p>

      <div class="result-score-ring">
        <div style="text-align:center;">
          <div class="result-score-inner" th:text="${result.score} + '/' + ${result.totalQuestions}">8/10</div>
          <div class="result-score-label">Doğru Cevap</div>
        </div>
      </div>
    </div>

    <!-- Sertifika Kartı -->
    <div th:if="${result.certificateIssued}" class="cert-card">
      <h3><i class="bi bi-award-fill"></i> Sertifikanız Hazır!</h3>
      <p>Sertifika kodunuz:</p>
      <div class="cert-code" th:text="${result.certificateCode}">GAZI-XXX</div>
      <br>
      <a th:href="@{/sertifika/dogrula/{code}(code=${result.certificateCode})}">
        <i class="bi bi-patch-check-fill"></i> Sertifikayı Doğrula
      </a>
    </div>

    <!-- Detaylı Sonuçlar -->
    <div class="result-card">
      <h3><i class="bi bi-list-check" style="color:#6366f1;"></i> Detaylı Sonuçlar</h3>

      <div th:each="detail, stat : ${result.details}" class="answer-item" th:classappend="${detail.correct} ? 'correct' : 'wrong'">
        <div class="answer-item-header">
          <div class="answer-q-text">
            <span class="answer-q-num" th:classappend="${detail.correct} ? 'correct' : 'wrong'"
                  th:text="${stat.count}">1</span>
            <span th:text="${detail.questionText}">Soru metni</span>
          </div>
          <span class="answer-badge" th:classappend="${detail.correct} ? 'correct' : 'wrong'">
            <i th:class="${detail.correct} ? 'bi bi-check-lg' : 'bi bi-x-lg'"></i>
            <span th:text="${detail.correct} ? 'Doğru' : 'Yanlış'">Doğru</span>
          </span>
        </div>
        <div class="answer-options">
          <span>
            Cevabınız:
            <span th:class="${detail.correct} ? 'correct-opt' : 'selected'"
                  th:text="${detail.selectedOption != null ? detail.selectedOption : 'Boş'}">B</span>
          </span>
          <span th:if="${!detail.correct}">
            — Doğru cevap:
            <span class="correct-opt" th:text="${detail.correctOption}">A</span>
          </span>
        </div>
        <div th:if="${detail.explanation != null and !detail.explanation.isEmpty()}" class="answer-explanation">
          <i class="bi bi-lightbulb-fill"></i>
          <span th:text="${detail.explanation}">Açıklama</span>
        </div>
      </div>
    </div>

    <!-- Aksiyonlar -->
    <div class="result-actions">
      <a th:href="@{/sinav/{id}(id=${course.id})}" class="result-btn primary">
        <i class="bi bi-arrow-left"></i> Sınav Sayfasına Dön
      </a>
      <a th:href="@{/egitimler/{id}(id=${course.id})}" class="result-btn outline">
        <i class="bi bi-book"></i> Kursa Git
      </a>
      <a th:if="${result.certificateIssued}" th:href="@{/sertifika/dogrula/{code}(code=${result.certificateCode})}" class="result-btn outline" style="border-color:#10b981;color:#059669;">
        <i class="bi bi-award"></i> Sertifikam
      </a>
    </div>

  </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
