<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
  <link rel="icon" type="image/png" th:href="@{/images/gazi-logo.png}">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${course.title} + ' — Sınav | GUZEM'">Sınav</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="exam-page">
  <div class="container" style="max-width: 800px;">

    <!-- Üst Bar -->
    <div class="exam-header">
      <div>
        <h2><i class="bi bi-mortarboard-fill" style="color:#6366f1;"></i> <span th:text="${course.title}">Kurs</span></h2>
        <div style="font-size:0.85rem;color:var(--text-muted);" id="questionCounter">
          Soru <span id="currentQ">1</span> / <span th:text="${totalQuestions}">10</span>
        </div>
      </div>
      <div class="exam-progress">
        <span id="answeredCount">0</span> / <span th:text="${totalQuestions}">10</span>
        <div class="exam-progress-bar">
          <div class="exam-progress-fill" id="progressFill" style="width:0%"></div>
        </div>
      </div>
    </div>

    <!-- Soru Navigasyonu -->
    <div class="exam-nav" id="questionNav">
      <button type="button" th:each="q, stat : ${questions}"
              th:text="${stat.count}"
              th:id="'nav-' + ${stat.count}"
              th:data-index="${stat.index}"
              class="exam-nav-dot">1</button>
    </div>

    <!-- Sınav Formu -->
    <form th:action="@{/sinav/{id}/gonder(id=${course.id})}" method="post" id="examForm">

      <div th:each="question, stat : ${questions}" class="exam-q-card" th:data-index="${stat.index}">

        <!-- Soru Metni + Medya -->
        <div class="exam-q-header">
          <span class="exam-q-num" th:text="${stat.count}">1</span>
          <span class="exam-q-text" th:text="${question.questionText}">Soru metni?</span>
        </div>

        <div th:if="${question.imagePath != null}" class="exam-q-media">
          <img th:src="@{'/uploads/' + ${question.imagePath}}" alt="Soru görseli" class="exam-q-img">
        </div>
        <div th:if="${question.videoPath != null}" class="exam-q-media">
          <video th:src="@{'/uploads/' + ${question.videoPath}}" controls preload="metadata" class="exam-q-video">
            Tarayıcınız video oynatmayı desteklemiyor.
          </video>
        </div>

        <!-- Şıklar -->
        <div class="exam-options">
          <label class="exam-opt-label" th:each="opt : ${ {'A','B','C','D','E'} }">
            <input type="radio"
                   th:name="'answer_' + ${question.id}"
                   th:value="${opt}"
                   th:data-qnum="${stat.count}"
                   th:data-index="${stat.index}">
            <span class="exam-opt-letter" th:text="${opt}">A</span>
            <span class="exam-opt-text"
                  th:text="${opt == 'A' ? question.optionA : (opt == 'B' ? question.optionB : (opt == 'C' ? question.optionC : (opt == 'D' ? question.optionD : question.optionE)))}">
              Seçenek
            </span>
          </label>
        </div>

        <!-- Navigasyon Butonları -->
        <div class="exam-nav-btns">
          <button type="button" class="exam-nav-btn prev-btn" disabled>
            <i class="bi bi-chevron-left"></i> Önceki
          </button>
          <button type="button" class="exam-nav-btn next-btn">
            Sonraki <i class="bi bi-chevron-right"></i>
          </button>
        </div>

        <!-- Son soruda: Gönder Butonu -->
        <div class="exam-submit-area" style="display:none;">
          <button type="submit" class="exam-submit-btn confirm-submit-btn" id="submitBtn">
            <i class="bi bi-send-fill"></i> Sınavı Tamamla
          </button>
          <p class="exam-warning">Gönderdikten sonra cevaplarınız değiştirilemez.</p>
        </div>

      </div>
    </form>

  </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<div id="examData" th:data-total-questions="${totalQuestions}" hidden></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
