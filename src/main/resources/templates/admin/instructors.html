<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
  <link rel="icon" type="image/png" th:href="@{/images/gazi-logo.png}">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eğitmen Yönetimi — GUZEM Admin</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    .instructor-photo {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
      background-color: var(--gray-100);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 1.2rem;
    }
    .instructor-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }
  </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<section class="page-header">
  <div class="container">
    <div class="breadcrumb">
      <a th:href="@{/admin}">Admin</a>
      <span class="separator">›</span>
      <span class="current">Eğitmenler</span>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;">
      <div>
        <h1><i class="bi bi-person-badge"></i> Eğitmen Yönetimi</h1>
        <p style="margin:0;color:var(--text-muted);">Sistemde kayıtlı eğitmenleri görüntüleyin.</p>
      </div>
      <a th:href="@{/admin/egitmenler/yeni}" class="btn btn-primary">
        <i class="bi bi-person-plus-fill"></i> Yeni Eğitmen
      </a>
    </div>
  </div>
</section>

<section class="section">
  <div class="container">



    <!-- Arama -->
    <div class="admin-search-bar">
      <input type="text" id="instructor-filter" placeholder="Eğitmen ara..." autocomplete="off">
    </div>

    <div th:if="${#lists.isEmpty(instructors)}"
         class="text-center" style="padding:4rem;color:var(--text-muted);">
      <div style="font-size:3rem;margin-bottom:1rem;"><i class="bi bi-person-x"></i></div>
      <p>Henüz eğitmen bulunmuyor.</p>
      <a th:href="@{/admin/egitmenler/yeni}" class="btn btn-primary" style="margin-top:1rem;">
        İlk Eğitmeni Ekle →
      </a>
    </div>

    <div th:if="${not #lists.isEmpty(instructors)}" style="overflow-x:auto;border-radius:12px;border:1px solid var(--border);">
      <table class="admin-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Eğitmen</th>
            <th>Uzmanlık</th>
            <th>İşlem</th>
          </tr>
        </thead>
        <tbody id="instructors-table-body">
          <tr th:each="ins : ${instructors}" class="instructor-row">
            <td style="color:var(--text-muted);" th:text="${ins.id}">1</td>

            <td>
              <div class="instructor-info">
                <img th:if="${ins.photoUrl != null}" th:src="@{${ins.photoUrl}}" class="instructor-photo" alt="Foto">
                <div th:unless="${ins.photoUrl != null}" class="instructor-photo">
                  <i class="bi bi-person-fill"></i>
                </div>
                <div>
                  <div th:text="${ins.name}" style="font-weight:700;color:var(--primary-700);" class="row-name">Adı</div>
                </div>
              </div>
            </td>

            <td th:text="${ins.expertise}">Uzmanlık</td>

            <td>
              <div style="display:flex;gap:0.4rem;flex-wrap:wrap;">
                <a th:href="@{/admin/egitmenler/{id}/duzenle(id=${ins.id})}" class="action-btn ab-edit">
                  <i class="bi bi-pencil"></i> Düzenle
                </a>
                <form th:action="@{/admin/egitmenler/{id}/sil(id=${ins.id})}" method="post">
                  <button type="submit" class="action-btn ab-del"
                          onclick="return confirm('Bu eğitmeni silmek istediğinize emin misiniz?')">
                    <i class="bi bi-trash3"></i>
                  </button>
                </form>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>
<script>
(function() {
  const input = document.getElementById('instructor-filter');
  if (!input) return;
  const rows = Array.from(document.querySelectorAll('.instructor-row'));
  input.addEventListener('input', function() {
    const q = this.value.trim().toLowerCase();
    rows.forEach(r => {
      const name = (r.querySelector('.row-name')?.textContent || '').toLowerCase();
      r.style.display = (!q || name.includes(q)) ? '' : 'none';
    });
  });
})();
</script>
</body>
</html>
