<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
  <link rel="icon" type="image/png" th:href="@{/images/gazi-logo.png}">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kayıt Yönetimi — GUZEM Admin</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<section class="page-header">
  <div class="container">
    <div class="breadcrumb">
      <a th:href="@{/admin}">Admin</a> <span class="separator">›</span>
      <span class="current">Kayıtlar</span>
    </div>
    <div>
      <h1><i class="bi bi-person-check-fill"></i> Kayıt Yönetimi</h1>
      <p style="margin:0;color:var(--text-muted);">
        Toplam <strong th:text="${enrollments.totalElements}">0</strong> kayıt
      </p>
    </div>
  </div>
</section>

<section class="section">
  <div class="container">

    <div th:if="${successMessage}"
         style="background:#d3f9d8;border:1px solid #69db7c;border-radius:10px;padding:1rem 1.25rem;margin-bottom:1.5rem;color:#2b8a3e;font-weight:600;">
      <i class="bi bi-check-circle-fill"></i> <span th:text="${successMessage}"></span>
    </div>

    <div th:if="${enrollments.totalElements == 0}"
         class="text-center" style="padding:4rem;color:var(--text-muted);">
      <div style="font-size:3rem;margin-bottom:1rem;"><i class="bi bi-person-check"></i></div>
      <p>Henüz kayıt bulunmuyor.</p>
    </div>

    <div th:if="${enrollments.totalElements > 0}" style="overflow-x:auto;border-radius:12px;border:1px solid var(--border);">
      <table class="admin-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Kullanıcı</th>
            <th>Kurs</th>
            <th>Durum</th>
            <th>İlerleme</th>
            <th>Kayıt Tarihi</th>
            <th>İşlem</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="e : ${enrollments.content}">
            <td style="color:var(--text-muted);" th:text="${e.id}">1</td>

            <td>
              <span style="font-weight:700;" th:text="'Öğrenci ID: ' + ${e.userId}">kullanici</span>
            </td>

            <td style="max-width:200px;">
              <a th:href="@{/egitimler/{id}(id=${e.courseId})}"
                 th:text="${e.courseTitle}"
                 style="color:var(--primary-600);font-weight:500;text-decoration:none;"></a>
            </td>

            <td>
              <span class="status-badge"
                    th:text="${e.status.displayName}"
                    th:classappend="${e.status.name() == 'ACTIVE'}            ? ' sb-green'  :
                                   (${e.status.name() == 'COMPLETED'}         ? ' sb-blue'   :
                                   (${e.status.name() == 'PENDING_PAYMENT'}   ? ' sb-orange' : ' sb-gray'))">
                —
              </span>
            </td>

            <td>
              <div style="display:flex;align-items:center;gap:0.5rem;">
                <div style="background:var(--gray-100);border-radius:4px;height:6px;width:80px;overflow:hidden;">
                  <div style="background:var(--gradient-primary);height:100%;border-radius:4px;"
                       th:style="'width:' + ${e.progressPercentage} + '%'"></div>
                </div>
                <span style="font-size:0.8rem;color:var(--text-muted);white-space:nowrap;"
                      th:text="${e.progressPercentage} + '%'">0%</span>
              </div>
            </td>

            <td style="white-space:nowrap;font-size:0.82rem;color:var(--text-muted);"
                th:text="${#temporals.format(e.enrollmentDate, 'dd.MM.yyyy')}">-</td>

            <td>
              <div style="display:flex;gap:0.4rem;flex-wrap:wrap;">
                <!-- Aktifleştir -->
                <form th:if="${e.status.name() == 'PENDING_PAYMENT'}"
                      th:action="@{/admin/kayitlar/{id}/aktifle(id=${e.id})}" method="post">
                  <button type="submit" class="action-btn ab-success">
                    <i class="bi bi-check-circle"></i> Aktifleştir
                  </button>
                </form>
                <!-- Sil -->
                <form th:action="@{/admin/kayitlar/{id}/sil(id=${e.id})}" method="post">
                  <button type="submit" class="action-btn ab-del"
                          onclick="return confirm('Bu kaydı silmek istediğinize emin misiniz?')">
                    <i class="bi bi-trash3"></i>
                  </button>
                </form>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Sayfalama -->
    <div th:if="${enrollments.totalPages > 1}"
         style="display:flex;gap:0.5rem;justify-content:center;margin-top:1.5rem;flex-wrap:wrap;">
      <a th:if="${enrollments.number > 0}"
         th:href="@{/admin/kayitlar(page=${enrollments.number - 1})}"
         class="btn btn-secondary">← Önceki</a>
      <span style="display:flex;align-items:center;padding:0 0.5rem;font-size:0.875rem;color:var(--text-muted);">
        Sayfa <strong style="margin:0 4px;" th:text="${enrollments.number + 1}">1</strong>
        / <span style="margin-left:4px;" th:text="${enrollments.totalPages}">1</span>
      </span>
      <a th:if="${enrollments.number < enrollments.totalPages - 1}"
         th:href="@{/admin/kayitlar(page=${enrollments.number + 1})}"
         class="btn btn-secondary">Sonraki →</a>
    </div>

  </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
