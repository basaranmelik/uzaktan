<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
  <link rel="icon" type="image/png" th:href="@{/images/gazi-logo.png}">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ödev Teslimleri — GUZEM Admin</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<section class="page-header admin-page-header">
  <div class="container">
    <div class="breadcrumb">
      <a th:href="@{/admin}">Admin</a>
      <span class="separator">›</span>
      <a th:href="@{/admin/odevler}">Ödevler</a>
      <span class="separator">›</span>
      <span class="current">Teslimler</span>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;">
      <div>
        <h1><i class="bi bi-person-lines-fill"></i> Teslimler: <span style="font-weight: 500;" th:text="${assignment.title}"></span></h1>
        <p style="margin:0; color:rgba(255,255,255,0.8);">
          <span style="opacity:0.8;">Kurs:</span> <span style="color:#ffffff; font-weight:600;" th:text="${assignment.courseTitle}"></span> |
          <span style="opacity:0.8;">Max Puan:</span> <strong style="color:#ffffff;" th:text="${assignment.maxScore}"></strong>
        </p>
      </div>
      <a th:href="@{/admin/odevler/{id}/indir-zip(id=${assignment.id})}" class="btn btn-primary" style="background:var(--primary-600);border:none;">
        <i class="bi bi-download"></i> Tümünü İndir (.zip)
      </a>
    </div>
  </div>
</section>

<section class="section">
  <div class="container">

    <div class="admin-search-bar">
      <input type="text" id="submission-filter" placeholder="Öğrenci veya e-posta ara..." autocomplete="off">
      <span style="font-size:0.82rem;color:var(--text-muted);" id="filter-count"></span>
    </div>

    <div th:if="${#lists.isEmpty(submissions)}"
         class="text-center" style="padding:4rem;color:var(--text-muted);">
      <div style="font-size:3rem;margin-bottom:1rem;"><i class="bi bi-inbox"></i></div>
      <p>Bu ödev için henüz teslim bulunmuyor.</p>
    </div>

    <div th:if="${not #lists.isEmpty(submissions)}" style="overflow-x:auto;border-radius:12px;border:1px solid var(--border);">
      <table class="admin-table">
        <thead>
          <tr>
            <th>Öğrenci</th>
            <th>E-posta</th>
            <th>Teslim Tarihi</th>
            <th>Dosya / Metin</th>
            <th>Puan</th>
            <th>Durum</th>
          </tr>
        </thead>
        <tbody id="submissions-table-body">
          <tr th:each="s : ${submissions}" class="submission-row">
            <td class="row-user" style="font-weight:600;color:var(--text);">
              <span th:text="${s.userFullName}">Ad Soyad</span>
            </td>
            <td class="row-email" style="font-family:monospace; color:var(--text-muted);" th:text="${s.userEmail}">ornek@gazi.edu.tr</td>
            <td>
              <span th:if="${s.submittedAt != null}">
                <i class="bi bi-clock"></i>
                <span th:text="${#temporals.format(s.submittedAt,'dd.MM.yyyy HH:mm')}"></span>
              </span>
            </td>
            <td>
              <a th:if="${s.originalFileName != null}" th:href="@{/dosyalar/teslimler/{id}(id=${s.id})}" class="action-btn ab-view" style="display:inline-flex; align-items:center; gap:0.25rem;">
                <i class="bi bi-file-earmark-arrow-down"></i> <span th:text="${s.originalFileName}" style="max-width:150px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"></span>
              </a>
              <span th:if="${s.originalFileName == null and s.textAnswer != null}" style="color:var(--text-muted); font-size:0.85rem;"><i class="bi bi-text-paragraph"></i> Metin Cevabı</span>
            </td>
            <td>
              <strong th:if="${s.score != null}" th:text="${s.score}" style="color:var(--primary-600);"></strong>
              <span th:if="${s.score == null}" style="color:var(--text-muted);">—</span>
            </td>
            <td>
               <span class="status-badge" th:classappend="${s.status.name() == 'GRADED'} ? 'sb-green' : 'sb-orange'" th:text="${s.status.displayName}">Durum</span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
