<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
  <link rel="icon" type="image/png" th:href="@{/images/gazi-logo.png}">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kurs Yönetimi — GUZEM Admin</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    .admin-table tbody tr.row-cancelled { opacity:0.55; }
    .quick-status select {
      font-size:0.78rem; padding:0.25rem 0.4rem;
      border:1px solid var(--border); border-radius:6px;
      background:var(--bg); color:var(--text); cursor:pointer;
    }
  </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<section class="page-header">
  <div class="container">
    <div class="breadcrumb">
      <a th:href="@{/admin}">Admin</a>
      <span class="separator">›</span>
      <span class="current">Kurslar</span>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;">
      <div>
        <h1><i class="bi bi-collection-fill"></i> Kurs Yönetimi</h1>
        <p style="margin:0;color:var(--text-muted);">
          Toplam <strong th:text="${courses.totalElements}">0</strong> kurs
        </p>
      </div>
      <a th:href="@{/admin/kurslar/yeni}" class="btn btn-primary">
        <i class="bi bi-plus-lg"></i> Yeni Kurs
      </a>
    </div>
  </div>
</section>

<section class="section">
  <div class="container">

    <div th:if="${successMessage}"
         style="background:#d3f9d8;border:1px solid #69db7c;border-radius:10px;padding:1rem 1.25rem;margin-bottom:1.5rem;color:#2b8a3e;font-weight:600;">
      <i class="bi bi-check-circle-fill"></i> <span th:text="${successMessage}"></span>
    </div>

    <!-- Arama -->
    <div class="admin-search-bar">
      <input type="text" id="course-filter" placeholder="Kurs başlığı veya eğitmen ara..." autocomplete="off">
      <span style="font-size:0.82rem;color:var(--text-muted);" id="filter-count"></span>
    </div>

    <div th:if="${courses.totalElements == 0}"
         class="text-center" style="padding:4rem;color:var(--text-muted);">
      <div style="font-size:3rem;margin-bottom:1rem;"><i class="bi bi-collection"></i></div>
      <p>Henüz kurs bulunmuyor.</p>
      <a th:href="@{/admin/kurslar/yeni}" class="btn btn-primary" style="margin-top:1rem;">
        İlk Kursu Oluştur →
      </a>
    </div>

    <div th:if="${courses.totalElements > 0}" style="overflow-x:auto;border-radius:12px;border:1px solid var(--border);">
      <table class="admin-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Kurs</th>
            <th>Kategori</th>
            <th>Eğitmen</th>
            <th>Fiyat</th>
            <th>Kayıt / Kontenjan</th>
            <th>Durum</th>
            <th>Durum Değiştir</th>
            <th>İşlem</th>
          </tr>
        </thead>
        <tbody id="courses-table-body">
          <tr th:each="course : ${courses.content}"
              th:classappend="${course.status.name() == 'CANCELLED'} ? ' row-cancelled'"
              class="course-row">
            <td style="color:var(--text-muted);" th:text="${course.id}">1</td>

            <td style="max-width:220px;">
              <a th:href="@{/egitimler/{id}(id=${course.id})}"
                 th:text="${course.title}"
                 style="font-weight:700;color:var(--primary-700);text-decoration:none;"
                 class="row-title">Kurs Adı</a>
              <div th:if="${course.startDate != null}"
                   style="font-size:0.75rem;color:var(--text-muted);margin-top:2px;">
                <i class="bi bi-calendar3"></i>
                <span th:text="${#temporals.format(course.startDate,'dd.MM.yyyy')}"></span>
                <span th:if="${course.endDate != null}">
                  — <span th:text="${#temporals.format(course.endDate,'dd.MM.yyyy')}"></span>
                </span>
              </div>
            </td>

            <td th:text="${course.categoryDisplayName}" style="white-space:nowrap;">Kategori</td>

            <td class="row-instructor">
              <span th:if="${course.instructorName != null and !#strings.isEmpty(course.instructorName)}"
                    th:text="${course.instructorName}">Eğitmen</span>
              <span th:if="${course.instructorName != null}"
                    style="font-size:0.75rem;color:var(--text-muted);display:block;">
                @<span th:text="${course.instructorName}"></span>
              </span>
              <span th:if="${course.instructorName == null or #strings.isEmpty(course.instructorName)}"
                    style="color:var(--text-muted);">—</span>
            </td>

            <td style="white-space:nowrap;font-weight:600;">
              <span th:if="${course.price != null and course.price.signum() == 0}"
                    style="color:#2b8a3e;">Ücretsiz</span>
              <span th:if="${course.price == null or course.price.signum() != 0}"
                    th:text="${course.price != null ? '₺' + #numbers.formatDecimal(course.price, 0, 'COMMA', 0, 'POINT') : '—'}">₺0</span>
            </td>

            <td style="white-space:nowrap;">
              <span th:text="${course.enrolledCount}">0</span>
              <span style="color:var(--text-muted);">/</span>
              <span th:text="${course.quota}">0</span>
              <div th:if="${course.quota != null and course.quota > 0}"
                   style="margin-top:3px;height:4px;background:var(--gray-100);border-radius:99px;width:70px;">
                <div th:with="pct=${course.enrolledCount >= course.quota ? 100 : (course.enrolledCount * 100 / course.quota)}"
                     th:style="'height:100%;border-radius:99px;width:' + ${pct} + '%;background:' +
                               (${course.enrolledCount >= course.quota} ? '#f03e3e' :
                               (${pct >= 80} ? '#fd7e14' : '#40c057'))"></div>
              </div>
            </td>

            <td>
              <span class="status-badge"
                    th:text="${course.status.displayName}"
                    th:classappend="${course.status.name() == 'PUBLISHED'}    ? ' sb-green'  :
                                   (${course.status.name() == 'DRAFT'}        ? ' sb-orange' :
                                   (${course.status.name() == 'IN_PROGRESS'}  ? ' sb-teal'   :
                                   (${course.status.name() == 'COMPLETED'}    ? ' sb-blue'   : ' sb-gray')))">
                Durum
              </span>
            </td>

            <td class="quick-status">
              <form th:action="@{/admin/kurslar/{id}/durum(id=${course.id})}" method="post">
                <select name="status" onchange="this.form.submit()" title="Durumu değiştir">
                  <option th:each="s : ${statuses}"
                          th:value="${s.name()}"
                          th:text="${s.displayName}"
                          th:selected="${s.name() == course.status.name()}">
                  </option>
                </select>
              </form>
            </td>

            <td>
              <div style="display:flex;gap:0.4rem;flex-wrap:wrap;">
                <a th:href="@{/admin/kurslar/{id}/videolar(id=${course.id})}" class="action-btn ab-view">
                  <i class="bi bi-play-circle"></i> Videolar
                </a>
                <a th:href="@{/admin/kurslar/{id}/duzenle(id=${course.id})}" class="action-btn ab-edit">
                  <i class="bi bi-pencil"></i> Düzenle
                </a>
                <form th:action="@{/admin/kurslar/{id}/sil(id=${course.id})}" method="post">
                  <button type="submit" class="action-btn ab-del"
                          onclick="return confirm('Bu kursu iptal etmek istediğinize emin misiniz?')">
                    <i class="bi bi-trash3"></i>
                  </button>
                </form>
              </div>
            </td>

          </tr>
        </tbody>
      </table>
    </div>

    <!-- Sayfalama -->
    <div th:if="${courses.totalPages > 1}"
         style="display:flex;gap:0.5rem;justify-content:center;margin-top:1.5rem;flex-wrap:wrap;">
      <a th:if="${courses.number > 0}"
         th:href="@{/admin/kurslar(page=${courses.number - 1})}"
         class="btn btn-secondary">← Önceki</a>
      <span style="display:flex;align-items:center;padding:0 0.5rem;font-size:0.875rem;color:var(--text-muted);">
        Sayfa <strong style="margin:0 4px;" th:text="${courses.number + 1}">1</strong>
        / <span style="margin-left:4px;" th:text="${courses.totalPages}">1</span>
      </span>
      <a th:if="${courses.number < courses.totalPages - 1}"
         th:href="@{/admin/kurslar(page=${courses.number + 1})}"
         class="btn btn-secondary">Sonraki →</a>
    </div>

  </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
<script>
(function() {
  const input = document.getElementById('course-filter');
  const count = document.getElementById('filter-count');
  if (!input) return;
  const rows = Array.from(document.querySelectorAll('.course-row'));
  input.addEventListener('input', function() {
    const q = this.value.trim().toLowerCase();
    let visible = 0;
    rows.forEach(r => {
      const title = (r.querySelector('.row-title')?.textContent || '').toLowerCase();
      const inst  = (r.querySelector('.row-instructor')?.textContent || '').toLowerCase();
      const show  = !q || title.includes(q) || inst.includes(q);
      r.style.display = show ? '' : 'none';
      if (show) visible++;
    });
    count.textContent = q ? visible + ' sonuç' : '';
  });
})();
</script>
</body>
</html>
