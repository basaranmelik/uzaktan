<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
  <link rel="icon" type="image/png" th:href="@{/images/gazi-logo.png}">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ödevler — GUZEM Admin</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<section class="page-header admin-page-header">
  <div class="container">
    <div class="breadcrumb">
      <a th:href="@{/admin}">Admin</a>
      <span class="separator">›</span>
      <span class="current">Ödevler</span>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;">
      <div>
        <h1><i class="bi bi-journal-text"></i> Tüm Ödevler</h1>
        <p style="margin:0;color:var(--text-muted);">Platformdaki tüm ödevler ve teslim bilgileri.</p>
      </div>
    </div>
  </div>
</section>

<section class="section">
  <div class="container">

    <div class="admin-search-bar">
      <input type="text" id="assignment-filter" placeholder="Ödev veya kurs başlığı ara..." autocomplete="off">
      <span style="font-size:0.82rem;color:var(--text-muted);" id="filter-count"></span>
    </div>

    <div th:if="${#lists.isEmpty(assignments)}"
         class="text-center" style="padding:4rem;color:var(--text-muted);">
      <div style="font-size:3rem;margin-bottom:1rem;"><i class="bi bi-journal-text"></i></div>
      <p>Henüz sisteme eklenmiş bir ödev bulunmamaktadır.</p>
    </div>

    <div th:if="${not #lists.isEmpty(assignments)}" style="overflow-x:auto;border-radius:12px;border:1px solid var(--border);">
      <table class="admin-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Kurs</th>
            <th>Ödev Başlığı</th>
            <th>Son Teslim Tarihi</th>
            <th>Max. Puan</th>
            <th>Teslim / Bekleyen</th>
            <th>İşlemler</th>
          </tr>
        </thead>
        <tbody id="assignments-table-body">
          <tr th:each="a : ${assignments}" class="assignment-row">
            <td style="font-family:monospace; color:var(--text-muted);" th:text="'#' + ${a.id}">#1</td>
            <td class="row-course" style="font-weight:600;color:var(--text); max-width:200px;">
              <span th:text="${a.courseTitle}">Kurs Adı</span>
            </td>
            <td class="row-title">
              <span style="font-weight:700;color:var(--primary-700);" th:text="${a.title}">Ödev Adı</span>
            </td>
            <td>
              <span th:if="${a.dueDate != null}">
                <i class="bi bi-calendar-event"></i>
                <span th:text="${#temporals.format(a.dueDate,'dd.MM.yyyy HH:mm')}"></span>
              </span>
              <span th:if="${a.dueDate == null}" style="color:var(--text-muted);">—</span>
            </td>
            <td th:text="${a.maxScore}">100</td>
            <td>
              <span class="status-badge sb-blue" th:text="${a.submissionCount} + ' Teslim'">0</span>
              <span th:if="${a.pendingGradeCount > 0}" class="status-badge sb-orange" style="margin-left:5px;">
                <span th:text="${a.pendingGradeCount}"></span> Bekleyen
              </span>
            </td>
            <td>
              <div style="display:flex;gap:0.4rem;flex-wrap:wrap;">
                <a th:href="@{/admin/odevler/{id}/teslimler(id=${a.id})}" class="action-btn ab-view">
                   <i class="bi bi-eye"></i> Teslimler
                </a>
                <a th:href="@{/admin/odevler/{id}/indir-zip(id=${a.id})}" class="action-btn ab-edit" style="background:#e6fcf5; color:#099268;">
                   <i class="bi bi-file-earmark-zip"></i> İndir
                </a>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
