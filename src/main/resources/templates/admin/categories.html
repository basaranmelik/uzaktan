<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
  <link rel="icon" type="image/png" th:href="@{/images/gazi-logo.png}">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kategori Yönetimi — GUZEM Admin</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<section class="page-header admin-page-header">
  <div class="container">
    <div class="breadcrumb">
      <a th:href="@{/admin}">Admin</a>
      <span class="separator">›</span>
      <span class="current">Kategoriler</span>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;">
      <div>
        <h1><i class="bi bi-tags-fill"></i> Kategori Yönetimi</h1>
        <p style="margin:0;color:var(--text-muted);">
          Toplam <strong th:text="${#lists.size(categories)}">0</strong> kategori
        </p>
      </div>
      <a th:href="@{/admin/kategoriler/yeni}" class="btn btn-primary">
        <i class="bi bi-plus-lg"></i> Yeni Kategori
      </a>
    </div>
  </div>
</section>

<section class="section">
  <div class="container">

    <div th:if="${successMessage}" class="alert alert-success" style="margin-bottom:1rem;" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" style="margin-bottom:1rem;" th:text="${errorMessage}"></div>

    <div th:if="${#lists.isEmpty(categories)}"
         class="text-center" style="padding:4rem;color:var(--text-muted);">
      <div style="font-size:3rem;margin-bottom:1rem;"><i class="bi bi-tags"></i></div>
      <p>Henüz kategori bulunmuyor.</p>
      <a th:href="@{/admin/kategoriler/yeni}" class="btn btn-primary" style="margin-top:1rem;">
        İlk Kategoriyi Oluştur →
      </a>
    </div>

    <div th:if="${!#lists.isEmpty(categories)}"
         style="overflow-x:auto;border-radius:12px;border:1px solid var(--border);">
      <table class="admin-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Kategori Adı</th>
            <th>İşlem</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="cat : ${categories}">
            <td style="width:60px;color:var(--text-muted);" th:text="${cat.id}"></td>
            <td style="font-weight:600;" th:text="${cat.displayName}"></td>
            <td style="width:120px;">
              <form th:action="@{/admin/kategoriler/{id}/sil(id=${cat.id})}" method="post"
                    onsubmit="return confirm('Bu kategoriyi silmek istediğinize emin misiniz?')">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="action-btn ab-del">
                  <i class="bi bi-trash3"></i> Sil
                </button>
              </form>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
