<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
  <link rel="icon" type="image/png" th:href="@{/images/gazi-logo.png}">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kurs Yorumları Yönetimi — GUZEM Admin</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    .review-user-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background-color: var(--primary-100);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary-700);
      font-weight: bold;
      font-size: 1.1rem;
    }
    .review-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }
  </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<section class="page-header admin-page-header">
  <div class="container">
    <div class="breadcrumb">
      <a th:href="@{/admin}">Admin</a>
      <span class="separator">›</span>
      <span class="current">Kurs Yorumları</span>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;">
      <div>
        <h1><i class="bi bi-star-half"></i> Onay Bekleyen Yorumlar</h1>
        <p style="margin:0;color:var(--text-muted);">Öğrencilerin kurslara yaptığı değerlendirmeleri onaylayın veya silin.</p>
      </div>
    </div>
  </div>
</section>

<section class="section">
  <div class="container">



    <!-- Arama -->
    <div class="admin-search-bar">
      <input type="text" id="review-filter" placeholder="Kullanıcı veya yorum içeriği ara..." autocomplete="off">
    </div>

    <div th:if="${#lists.isEmpty(pendingReviews)}"
         class="text-center" style="padding:4rem;color:var(--text-muted);">
      <div style="font-size:3rem;margin-bottom:1rem;"><i class="bi bi-check2-all"></i></div>
      <p>Şu anda onay bekleyen hiçbir yorum bulunmuyor. Harika!</p>
    </div>

    <div th:if="${not #lists.isEmpty(pendingReviews)}" style="overflow-x:auto;border-radius:12px;border:1px solid var(--border);">
      <table class="admin-table">
        <thead>
          <tr>
            <th>Kullanıcı (Tarih)</th>
            <th>Kurs</th>
            <th>Puan & Yorum</th>
            <th>İşlem</th>
          </tr>
        </thead>
        <tbody id="reviews-table-body">
          <tr th:each="rev : ${pendingReviews}" class="review-row">
            <td>
              <div class="review-info">
                <div class="review-user-avatar" th:text="${#strings.substring(rev.userFullName,0,1)}">A</div>
                <div>
                  <div th:text="${rev.userFullName}" style="font-weight:700;color:var(--primary-700);" class="row-name">Adı</div>
                  <div style="font-size:0.75rem; color:var(--text-muted);" th:text="${#temporals.format(rev.createdAt, 'dd.MM.yyyy HH:mm')}">Tarih</div>
                </div>
              </div>
            </td>

            <td th:text="${rev.courseTitle}">Kurs</td>

            <td>
               <div style="color:#fbbf24; font-size:0.9rem; margin-bottom:0.25rem;">
                 <span th:each="i : ${#numbers.sequence(1, rev.rating)}">★</span><span style="color:#cbd5e1;" th:if="${rev.rating < 5}" th:each="i : ${#numbers.sequence(1, 5 - rev.rating)}">★</span>
               </div>
               <div class="row-comment" th:text="${rev.comment}" style="font-size:0.85rem; color:var(--text); max-width:300px; white-space:pre-wrap;">Yorum...</div>
            </td>

            <td>
              <div style="display:flex;gap:0.4rem;flex-wrap:wrap;">
                <form th:action="@{/admin/yorumlar/{id}/onayla(id=${rev.id})}" method="post">
                  <button type="submit" class="action-btn" style="background:#d1fae5; color:#059669; border-color:#a7f3d0;" title="Onayla">
                    <i class="bi bi-check-lg"></i> Onayla
                  </button>
                </form>
                <form th:action="@{/admin/yorumlar/{id}/sil(id=${rev.id})}" method="post">
                  <button type="submit" class="action-btn ab-del confirm-delete-btn">
                    <i class="bi bi-trash3"></i> Sil
                  </button>
                </form>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
