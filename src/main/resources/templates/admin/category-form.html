<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
  <link rel="icon" type="image/png" th:href="@{/images/gazi-logo.png}">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yeni Kategori — GUZEM Admin</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    .form-section {
      border:1px solid var(--border);border-radius:12px;
      padding:1.5rem;margin-bottom:1.5rem;background:var(--bg);
    }
    .form-section-title {
      font-size:0.72rem;font-weight:700;text-transform:uppercase;
      letter-spacing:0.8px;color:var(--text-muted);margin:0 0 1.25rem 0;
      padding-bottom:0.75rem;border-bottom:1px solid var(--gray-100);
      display:flex;align-items:center;gap:6px;
    }
  </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<section class="page-header admin-page-header">
  <div class="container">
    <div class="breadcrumb">
      <a th:href="@{/admin}">Admin</a> <span class="separator">›</span>
      <a th:href="@{/admin/kategoriler}">Kategoriler</a> <span class="separator">›</span>
      <span class="current">Yeni Kategori</span>
    </div>
    <h1><i class="bi bi-plus-circle-fill"></i> Yeni Kategori Oluştur</h1>
  </div>
</section>

<section class="section">
  <div class="container" style="max-width:500px;">

    <div th:if="${errorMessage}" class="alert alert-danger" style="margin-bottom:1rem;" th:text="${errorMessage}"></div>

    <form th:action="@{/admin/kategoriler}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

      <div class="form-section">
        <p class="form-section-title"><i class="bi bi-tag"></i> Kategori Bilgisi</p>
        <div class="form-group">
          <label>Kategori Adı <span style="color:#e03131;">*</span></label>
          <input type="text" name="displayName" class="form-control" required
                 maxlength="100" placeholder="örn: Yapay Zeka" autofocus>
        </div>
      </div>

      <div style="display:flex;gap:0.75rem;">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-check-lg"></i> Oluştur
        </button>
        <a th:href="@{/admin/kategoriler}" class="btn btn-secondary">İptal</a>
      </div>
    </form>

  </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
