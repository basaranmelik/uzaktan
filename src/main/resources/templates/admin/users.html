<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
  <link rel="icon" type="image/png" th:href="@{/images/gazi-logo.png}">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kullanıcı Yönetimi — GUZEM Admin</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<section class="page-header admin-page-header">
  <div class="container">
    <div class="breadcrumb">
      <a th:href="@{/admin}">Admin</a> <span class="separator">›</span>
      <span class="current">Kullanıcılar</span>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;">
      <div>
        <h1><i class="bi bi-people-fill"></i> Kullanıcı Yönetimi</h1>
        <p style="margin:0;color:var(--text-muted);">
          Toplam <strong th:text="${#lists.size(users)}">0</strong> kullanıcı
        </p>
      </div>
    </div>
  </div>
</section>

<section class="section">
  <div class="container">



    <!-- Arama -->
    <div class="admin-search-bar">
      <input type="text" id="user-filter" placeholder="Ad, kullanıcı adı veya e-posta ara..." autocomplete="off">
      <span style="font-size:0.82rem;color:var(--text-muted);" id="filter-count"></span>
    </div>

    <div th:if="${#lists.isEmpty(users)}"
         class="text-center" style="padding:4rem;color:var(--text-muted);">
      <div style="font-size:3rem;margin-bottom:1rem;"><i class="bi bi-people"></i></div>
      <p>Henüz kayıtlı kullanıcı bulunmuyor.</p>
    </div>

    <div th:if="${!#lists.isEmpty(users)}" style="overflow-x:auto;border-radius:12px;border:1px solid var(--border);">
      <table class="admin-table">
        <thead>
          <tr>
            <th>Ad Soyad</th>

            <th>E-posta</th>
            <th>Rol</th>
            <th>Durum</th>
            <th>Kayıt Tarihi</th>
            <th>İşlemler</th>
          </tr>
        </thead>
        <tbody id="users-table-body">
          <tr th:each="u : ${users}"
              class="user-row">
            <td>
              <span style="font-weight:700;" class="row-fullname" th:text="${u.fullName}">Ad Soyad</span>
            </td>

            <td class="row-email" th:text="${u.email}" style="font-size:0.82rem;color:var(--text-muted);">email</td>

            <td>
              <form th:action="@{/admin/kullanicilar/{id}/rol(id=${u.id})}" method="post" style="display:inline;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <select name="role" class="role-select-auto-submit"
                        style="font-size:0.78rem;padding:0.25rem 0.4rem;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);cursor:pointer;">
                  <option th:each="r : ${roles}"
                          th:value="${r.name()}"
                          th:text="${r.displayName}"
                          th:selected="${r.name() == u.role.name()}">
                  </option>
                </select>
              </form>
            </td>

            <td>
              <span th:if="${u.locked}" class="status-badge sb-orange">
                <i class="bi bi-lock-fill"></i> Kilitli
              </span>
              <span th:if="${!u.locked}" class="status-badge sb-green">
                <i class="bi bi-check-circle-fill"></i> Aktif
              </span>
            </td>

            <td style="white-space:nowrap;font-size:0.82rem;color:var(--text-muted);"
                th:text="${#temporals.format(u.createdAt, 'dd.MM.yyyy')}">Tarih</td>

            <td>
              <div style="display:flex;gap:0.4rem;flex-wrap:wrap;">
                
                <!-- Detay Butonu -->
                <button type="button" class="action-btn show-user-modal-btn" style="background:#e7f5ff;color:#1c7ed6;" title="Detay"
                        th:data-name="${u.fullName}" th:data-email="${u.email}" th:data-phone="${u.phoneNumber}"
                        th:data-birth="${u.birthDate}" th:data-city="${u.city}" th:data-district="${u.district}"
                        th:data-address="${u.fullAddress}" th:data-zip="${u.zipCode}">
                  <i class="bi bi-info-circle-fill"></i>
                </button>

                <!-- Kilitle / Aç -->
                <form th:action="@{/admin/kullanicilar/{id}/kilitle(id=${u.id})}" method="post">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                  <button type="submit"
                          th:class="${u.locked} ? 'action-btn ab-success' : 'action-btn ab-warn'"
                          th:title="${u.locked} ? 'Kilidi Aç' : 'Kilitle'">
                    <i th:class="${u.locked} ? 'bi bi-unlock-fill' : 'bi bi-lock-fill'"></i>
                  </button>
                </form>
                <!-- Sil -->
                <form th:if="${!u.locked}"
                      th:action="@{/admin/kullanicilar/{id}/sil(id=${u.id})}" method="post">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                  <button type="submit" class="action-btn ab-del confirm-delete-btn"
                          title="Sil">
                    <i class="bi bi-trash3"></i>
                  </button>
                </form>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>
</section>

<!-- Kullanıcı Detay Modal -->
<div id="userModalOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9998; backdrop-filter:blur(4px);"></div>
<div id="userModal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); width:90%; max-width:500px; background:var(--bg); border:1px solid var(--border); border-radius:16px; box-shadow:0 10px 40px rgba(0,0,0,0.2); z-index:9999; padding:24px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; border-bottom:1px solid var(--border); padding-bottom:12px;">
        <h3 style="margin:0; font-size:18px; color:var(--text-primary);"><i class="bi bi-person-vcard"></i> Kullanıcı Detayları</h3>
        <button class="close-user-modal-btn" style="background:transparent; border:none; font-size:24px; cursor:pointer; color:var(--text-muted);">&times;</button>
    </div>
    <div style="display:flex; flex-direction:column; gap:12px;">
        <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid rgba(0,0,0,0.05);">
            <strong style="color:var(--text-secondary); font-size:14px;">Ad Soyad:</strong>
            <span id="modalFullName" style="font-weight:600; color:var(--text-primary);"></span>
        </div>
        <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid rgba(0,0,0,0.05);">
            <strong style="color:var(--text-secondary); font-size:14px;">E-posta:</strong>
            <span id="modalEmail" style="color:var(--text-primary);"></span>
        </div>
        <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid rgba(0,0,0,0.05);">
            <strong style="color:var(--text-secondary); font-size:14px;">Telefon:</strong>
            <span id="modalPhone" style="color:var(--text-primary);"></span>
        </div>
        <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid rgba(0,0,0,0.05);">
            <strong style="color:var(--text-secondary); font-size:14px;">Doğum Tarihi:</strong>
            <span id="modalBirthDate" style="color:var(--text-primary);"></span>
        </div>
        <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid rgba(0,0,0,0.05);">
            <strong style="color:var(--text-secondary); font-size:14px;">İl / İlçe:</strong>
            <span id="modalLocation" style="color:var(--text-primary);"></span>
        </div>
        <div style="display:flex; flex-direction:column; gap:4px; padding:8px 0; border-bottom:1px solid rgba(0,0,0,0.05);">
            <strong style="color:var(--text-secondary); font-size:14px;">Tam Adres (<span id="modalZipcode"></span>)</strong>
            <p id="modalAddress" style="margin:0; font-size:14px; color:var(--text-muted); line-height:1.5;"></p>
        </div>
    </div>
    <div style="text-align:right; margin-top:24px;">
        <button class="btn btn-primary close-user-modal-btn" style="padding:10px 24px; border-radius:8px;">Kapat</button>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
