<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
  <link rel="icon" type="image/png" th:href="@{/images/gazi-logo.png}">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yeni Eğitmen Ekle — GUZEM Admin</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<section class="page-header admin-page-header">
  <div class="container">
    <div class="breadcrumb">
      <a th:href="@{/admin}">Admin</a>
      <span class="separator">›</span>
      <a th:href="@{/admin/egitmenler}">Eğitmenler</a>
      <span class="separator">›</span>
      <span class="current">Yeni</span>
    </div>
    <h1 style="margin-top:0.5rem;">
      <i class="bi bi-person-plus-fill"></i> Yeni Eğitmen Ekle
    </h1>
  </div>
</section>

<section class="section">
  <div class="container">
    <div th:replace="~{fragments/flash-messages :: flashMessages}"></div>
    <div class="form-card">
      <div class="info-box">
        <i class="bi bi-info-circle"></i>
        Eğitmen hesabı oluşturulduğunda otomatik bir geçici şifre üretilecektir.
        Eğitmen ilk girişinde şifresini değiştirmek zorunda kalacaktır.
      </div>

      <form th:action="@{/admin/egitmenler}" th:object="${teacherRequest}" method="post" enctype="multipart/form-data">

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
          <div class="form-group">
            <label for="firstName">Ad *</label>
            <input type="text" id="firstName" th:field="*{firstName}" class="form-control" placeholder="Örn: Ali" maxlength="50">
            <span class="text-danger" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></span>
          </div>

          <div class="form-group">
            <label for="lastName">Soyad *</label>
            <input type="text" id="lastName" th:field="*{lastName}" class="form-control" placeholder="Örn: Yılmaz" maxlength="50">
            <span class="text-danger" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></span>
          </div>
        </div>

        <div class="form-group">
          <label for="email">E-posta Adresi *</label>
          <input type="email" id="email" th:field="*{email}" class="form-control" placeholder="ornek@gazi.edu.tr">
          <span class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
        </div>

        <div class="form-group">
          <label for="expertise">Uzmanlık Alanı</label>
          <input type="text" id="expertise" th:field="*{expertise}" class="form-control" placeholder="Örn: Yazılım Mühendisliği" maxlength="500">
        </div>

        <div class="form-group">
          <label for="bio">Biyografi</label>
          <textarea id="bio" th:field="*{bio}" class="form-control" rows="4" placeholder="Eğitmen hakkında kısa bilgi..."></textarea>
        </div>

        <div class="form-group">
          <label for="zoomEmail">Zoom E-posta Adresi</label>
          <input type="email" id="zoomEmail" th:field="*{zoomEmail}" class="form-control" placeholder="ornek@zoom.us">
          <small style="color: var(--text-muted);">Toplantılar bu Zoom hesabı altında oluşturulur.</small>
        </div>

        <div class="form-group">
          <label for="photo">Profil Fotoğrafı</label>
          <input type="file" id="photo" name="photo" class="form-control" accept="image/*">
        </div>

        <div style="display:flex;gap:1rem;margin-top:2rem;">
          <button type="submit" class="btn btn-primary" style="flex:1;">
            <i class="bi bi-save"></i> Eğitmen Oluştur
          </button>
          <a th:href="@{/admin/egitmenler}" class="btn btn-secondary">İptal</a>
        </div>
      </form>
    </div>
  </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
