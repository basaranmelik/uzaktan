<!DOCTYPE html>
<html lang="tr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <link rel="icon" type="image/png" th:href="@{/images/gazi-logo.png}">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="GUZEM eğitmenler kadrosu. Alanında uzman eğitmenlerimizle tanışın.">
  <title>Eğitmenler | Gazi Üniversitesi</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    .instructor-image {
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      border-radius: inherit;
    }
  </style>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}" th:with="activeMenu='instructors'"></div>

<!-- Page Header -->
<section class="page-header">
  <div class="container">
    <div class="breadcrumb">
      <a th:href="@{/}">Ana Sayfa</a>
      <span class="separator">›</span>
      <span class="current">Eğitmenler</span>
    </div>
    <h1>Uzman Eğitmenlerimiz</h1>
    <p>Sektörde yılların deneyimine sahip, alanında uzman eğitmenlerimizle tanışın.</p>
  </div>
</section>

<!-- Instructors Grid -->
<section class="section">
  <div class="container">

    <!-- Eğitmen var -->
    <div class="instructors-grid" th:if="${not #lists.isEmpty(instructors)}">
      <div th:each="instructor : ${instructors}"
           class="instructor-card fade-in">
        <div class="instructor-avatar">
          <div th:if="${instructor.photoUrl != null}" class="instructor-image" th:style="'background-image: url(' + @{${instructor.photoUrl}} + ');'"></div>
          <i th:unless="${instructor.photoUrl != null}" class="bi bi-person-circle"></i>
        </div>
        <div class="instructor-info">
          <h3 class="instructor-name" th:text="${instructor.name}">Eğitmen Adı</h3>
          <div class="instructor-expertise">
            <span th:text="${instructor.expertise}">Uzmanlık Alanı</span>
          </div>
          <p class="instructor-bio" th:if="${instructor.bio != null and !instructor.bio.isEmpty()}"
             th:text="${#strings.abbreviate(instructor.bio, 120)}">
            Kısa biyografi...
          </p>
          <div class="instructor-meta">
            <span><i class="bi bi-journal-bookmark-fill"></i> <strong th:text="${instructor.courseCount}">0</strong> Kurs</span>
            <span><i class="bi bi-people-fill"></i> <strong th:text="${instructor.studentCount}">0</strong> Öğrenci</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Eğitmen yok -->
    <div th:if="${#lists.isEmpty(instructors)}"
         class="text-center" style="padding:4rem;color:var(--text-muted);">
      <i class="bi bi-person-x" style="font-size:3rem;display:block;margin-bottom:1rem;"></i>
      Henüz kayıtlı eğitmen bulunmamaktadır.
    </div>

  </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
