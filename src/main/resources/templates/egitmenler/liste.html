<!DOCTYPE html>
<html lang="tr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <link rel="icon" type="image/png" th:href="@{/images/gazi-logo.png}">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="GUZEM eğitmenler kadrosu. Alanında uzman eğitmenlerimizle tanışın.">
  <title>Eğitmenler | Gazi Üniversitesi</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}" th:with="activeMenu='instructors'"></div>

<!-- Page Header -->
<section class="page-header">
  <div class="container">
    <div class="breadcrumb">
      <a th:href="@{/}">Ana Sayfa</a>
      <span class="separator">›</span>
      <span class="current">Eğitmenler</span>
    </div>
    <h1>Uzman Eğitmenlerimiz</h1>
    <p>Sektörde yılların deneyimine sahip, alanında uzman eğitmenlerimizle tanışın.</p>
  </div>
</section>

<!-- Instructors Grid -->
<section class="section">
  <div class="container">

    <!-- Eğitmen var -->
    <div class="instructors-grid" th:if="${not #lists.isEmpty(instructors)}">
      <a th:each="instructor : ${instructors}" th:href="@{/egitmenler/{id}(id=${instructor.id})}" class="instructor-card fade-in" style="text-decoration:none;color:inherit;">

        <!-- Fotoğraf -->
        <div class="instructor-avatar">
          <img th:if="${instructor.profilePictureUrl != null}"
               th:src="@{${instructor.profilePictureUrl}}" alt=""
               style="width:100%;height:100%;object-fit:cover;">
          <i th:if="${instructor.profilePictureUrl == null}" class="bi bi-person-circle"></i>
        </div>

        <!-- Bilgi -->
        <div class="instructor-info">
          <h3 class="instructor-name" th:text="${instructor.fullName}">Eğitmen Adı</h3>
          <div class="instructor-skills"
               th:if="${instructor.skillsList != null and !instructor.skillsList.isEmpty()}">
            <span th:each="skill : ${instructor.skillsList}">
              <span class="skill-tag" th:text="${skill}"></span>
            </span>
          </div>
          <p style="font-size:0.8rem;color:var(--primary-500);font-weight:600;margin-top:auto;padding-top:0.75rem;">
            Profili İncele <i class="bi bi-arrow-right"></i>
          </p>
        </div>

      </a>
    </div>

    <!-- Eğitmen yok -->
    <div th:if="${#lists.isEmpty(instructors)}"
         class="text-center" style="padding:4rem;color:var(--text-muted);">
      <i class="bi bi-person-x" style="font-size:3rem;display:block;margin-bottom:1rem;"></i>
      Henüz kayıtlı eğitmen bulunmamaktadır.
    </div>

  </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
