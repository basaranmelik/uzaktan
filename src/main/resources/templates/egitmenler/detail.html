<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
  <link rel="icon" type="image/png" th:href="@{/images/gazi-logo.png}">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${instructor.fullName} + ' — GUZEM'">Eğitmen | Gazi Üniversitesi</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<section class="page-header" style="background:var(--gradient-hero);padding:calc(var(--nav-height) + 2rem) 0 3rem;">
  <div class="container">
    <div class="breadcrumb">
      <a th:href="@{/}" style="color:rgba(255,255,255,0.5);">Ana Sayfa</a>
      <span class="separator" style="color:rgba(255,255,255,0.25);">›</span>
      <a th:href="@{/egitmenler}" style="color:rgba(255,255,255,0.5);">Eğitmenler</a>
      <span class="separator" style="color:rgba(255,255,255,0.25);">›</span>
      <span class="current" style="color:rgba(255,255,255,0.9);" th:text="${instructor.fullName}">Eğitmen</span>
    </div>
  </div>
</section>

<section class="section" style="margin-top:-2rem;">
  <div class="container" style="max-width:860px;">

    <!-- Profil Kartı -->
    <div style="background:var(--bg);border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow-lg);overflow:hidden;">

      <!-- Üst bant -->
      <div style="height:8px;background:var(--gradient-primary);"></div>

      <div style="padding:3rem 3rem 2.5rem;display:flex;gap:3rem;align-items:flex-start;flex-wrap:wrap;">

        <!-- Fotoğraf -->
        <div style="flex-shrink:0;">
          <div style="width:220px;height:220px;border-radius:24px;overflow:hidden;background:var(--primary-50);border:4px solid var(--primary-100);box-shadow:0 12px 40px rgba(17,58,113,0.18);display:flex;align-items:center;justify-content:center;">
            <img th:if="${instructor.profilePictureUrl != null}"
                 th:src="@{${instructor.profilePictureUrl}}" alt=""
                 style="width:100%;height:100%;object-fit:cover;">
            <i th:if="${instructor.profilePictureUrl == null}"
               class="bi bi-person-circle"
               style="font-size:7rem;color:var(--primary-200);"></i>
          </div>
        </div>

        <!-- Bilgiler -->
        <div style="flex:1;min-width:260px;">
          <h1 style="font-size:2rem;font-weight:800;color:var(--text);line-height:1.2;margin:0 0 0.4rem;"
              th:text="${instructor.fullName}">Ad Soyad</h1>

          <p style="font-size:1rem;color:var(--primary-600);font-weight:600;margin:0 0 1.5rem;">Eğitmen</p>

          <!-- Uzmanlık alanları -->
          <div th:if="${instructor.skillsList != null and !instructor.skillsList.isEmpty()}"
               style="margin-bottom:1.5rem;">
            <div style="font-size:0.72rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.6rem;">
              Uzmanlık Alanları
            </div>
            <div style="display:flex;flex-wrap:wrap;gap:0.4rem;">
              <span th:each="skill : ${instructor.skillsList}"
                    style="display:inline-block;background:var(--primary-50);color:var(--primary-700);font-size:0.82rem;font-weight:600;padding:0.3rem 0.85rem;border-radius:20px;border:1px solid var(--primary-100);"
                    th:text="${skill}"></span>
            </div>
          </div>

          <!-- İletişim / şehir -->
          <div style="display:flex;flex-wrap:wrap;gap:1rem;">
            <span th:if="${instructor.city != null}"
                  style="display:flex;align-items:center;gap:0.4rem;font-size:0.85rem;color:var(--text-muted);">
              <i class="bi bi-geo-alt-fill" style="color:var(--primary-400);"></i>
              <span th:text="${instructor.city}"></span>
            </span>
          </div>
        </div>

      </div>

      <!-- Biyografi -->
      <div th:if="${instructor.bio != null and !#strings.isEmpty(instructor.bio)}"
           style="padding:0 3rem 3rem;">
        <div style="border-top:1px solid var(--border);padding-top:2rem;">
          <div style="font-size:0.72rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.85rem;">
            <i class="bi bi-person-lines-fill" style="color:var(--primary-400);margin-right:0.35rem;"></i>
            Hakkında
          </div>
          <p style="font-size:1rem;color:var(--text-alt);line-height:1.85;margin:0;"
             th:text="${instructor.bio}"></p>
        </div>
      </div>

      <!-- Bio yoksa padding kapat -->
      <div th:if="${instructor.bio == null or #strings.isEmpty(instructor.bio)}"
           style="padding-bottom:2.5rem;"></div>

    </div>

    <!-- Geri git -->
    <div style="margin-top:1.5rem;">
      <a th:href="@{/egitmenler}"
         style="display:inline-flex;align-items:center;gap:0.5rem;font-size:0.88rem;font-weight:600;color:var(--text-muted);text-decoration:none;">
        <i class="bi bi-arrow-left"></i> Tüm Eğitmenler
      </a>
    </div>

  </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
