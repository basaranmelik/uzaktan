<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
  <link rel="icon" type="image/png" th:href="@{/images/gazi-logo.png}">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${assignment.title} + ' — Teslimler'">Teslimler</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<section class="page-header">
  <div class="container">
    <div class="breadcrumb">
      <a th:href="@{/egitmen/panel}">Eğitmen Paneli</a> <span class="separator">›</span>
      <a th:href="@{/egitmen/kurslarim/{id}/odevler(id=${assignment.courseId})}"
         th:text="${assignment.courseTitle}">Kurs</a> <span class="separator">›</span>
      <span class="current">Teslimler</span>
    </div>
    <div>
      <h1><i class="bi bi-inbox-fill"></i> Teslimler</h1>
      <p style="margin:0;" th:text="${assignment.title}">Ödev</p>
    </div>
  </div>
</section>

<section class="section">
  <div class="container">

    <div th:if="${successMessage}"
         style="background:#d3f9d8;border:1px solid #69db7c;border-radius:8px;padding:1rem;margin-bottom:1.5rem;color:#2b8a3e;font-weight:600;">
      <i class="bi bi-check-circle-fill"></i> <span th:text="${successMessage}"></span>
    </div>

    <!-- Ödev bilgi çubuğu -->
    <div style="background:var(--bg-alt);border:1px solid var(--border);border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.5rem;display:flex;flex-wrap:wrap;gap:1.25rem;font-size:0.875rem;">
      <div style="display:flex;align-items:center;gap:6px;color:var(--text-alt);">
        <i class="bi bi-trophy" style="color:var(--text-muted);"></i>
        Maks Puan: <strong th:text="${assignment.maxScore}">0</strong>
      </div>
      <div th:if="${assignment.dueDate != null}"
           style="display:flex;align-items:center;gap:6px;color:var(--text-alt);">
        <i class="bi bi-calendar-check" style="color:var(--text-muted);"></i>
        Son Tarih: <strong th:text="${#temporals.format(assignment.dueDate,'dd.MM.yyyy HH:mm')}">—</strong>
      </div>
      <div style="display:flex;align-items:center;gap:6px;color:var(--text-alt);">
        <i class="bi bi-inbox" style="color:var(--text-muted);"></i>
        Teslim: <strong th:text="${assignment.submissionCount}">0</strong>
      </div>
      <div th:if="${assignment.pendingGradeCount > 0}"
           style="display:flex;align-items:center;gap:6px;color:#e8590c;">
        <i class="bi bi-hourglass-split"></i>
        Bekleyen: <strong th:text="${assignment.pendingGradeCount}">0</strong>
      </div>
    </div>

    <div th:if="${#lists.isEmpty(submissions)}"
         class="text-center" style="padding:4rem;color:var(--text-muted);">
      <div style="font-size:3rem;margin-bottom:1rem;"><i class="bi bi-inbox"></i></div>
      <p>Henüz teslim yapılmamış.</p>
    </div>

    <div th:if="${!#lists.isEmpty(submissions)}"
         style="overflow-x:auto;border-radius:12px;border:1px solid var(--border);">
      <table class="admin-table">
        <thead>
          <tr>
            <th>Öğrenci</th>
            <th>Teslim Tarihi</th>
            <th>İçerik</th>
            <th>Dosya</th>
            <th>Durum</th>
            <th>Not</th>
            <th>İşlem</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="s : ${submissions}">
            <td>
              <div style="font-weight:700;" th:text="${s.userFullName}">Ad Soyad</div>
            </td>

            <td style="white-space:nowrap;font-size:0.82rem;color:var(--text-muted);">
              <span th:if="${s.submittedAt != null}"
                    th:text="${#temporals.format(s.submittedAt,'dd.MM.yyyy HH:mm')}">—</span>
            </td>

            <td style="max-width:200px;">
              <span th:if="${s.textAnswer != null and !#strings.isEmpty(s.textAnswer)}"
                    style="font-size:0.82rem;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"
                    th:text="${s.textAnswer}"></span>
              <span th:if="${s.textAnswer == null or #strings.isEmpty(s.textAnswer)}"
                    style="color:var(--text-muted);font-size:0.82rem;">—</span>
            </td>

            <td>
              <a th:if="${s.hasFile}"
                 th:href="@{/dosyalar/teslimler/{id}(id=${s.id})}"
                 class="action-btn ab-view" style="font-size:0.75rem;">
                <i class="bi bi-download"></i> <span th:text="${s.originalFileName}">dosya</span>
              </a>
              <span th:if="${!s.hasFile}" style="color:var(--text-muted);font-size:0.82rem;">—</span>
            </td>

            <td>
              <span class="status-badge"
                    th:text="${s.statusDisplayName}"
                    th:classappend="${s.status.name() == 'GRADED'} ? ' sb-green' : ' sb-orange'">
              </span>
            </td>

            <td style="white-space:nowrap;font-weight:600;">
              <span th:if="${s.score != null}"
                    th:text="${s.score} + ' / ' + ${s.assignmentMaxScore}">—</span>
              <span th:if="${s.score == null}" style="color:var(--text-muted);">—</span>
            </td>

            <td>
              <a th:href="@{/egitmen/teslimler/{id}/notlandir(id=${s.id})}"
                 class="action-btn ab-edit">
                <i class="bi bi-star"></i>
                <span th:text="${s.status.name() == 'GRADED'} ? 'Güncelle' : 'Notlandır'">Notlandır</span>
              </a>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
