<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
  <link rel="icon" type="image/png" th:href="@{/images/gazi-logo.png}">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="'Düzenle: ' + ${assignment.title}">Ödev Düzenle</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    .form-section {
      border:1px solid var(--border); border-radius:12px;
      padding:1.5rem; margin-bottom:1.5rem; background:var(--bg);
    }
    .form-section-title {
      font-size:0.72rem; font-weight:700; text-transform:uppercase;
      letter-spacing:0.8px; color:var(--text-muted); margin:0 0 1.25rem 0;
      padding-bottom:0.75rem; border-bottom:1px solid var(--gray-100);
      display:flex; align-items:center; gap:6px;
    }
    .form-section-title i { font-size:0.9rem; }
  </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<section class="page-header">
  <div class="container">
    <div class="breadcrumb">
      <a th:href="@{/egitmen/panel}">Eğitmen Paneli</a> <span class="separator">›</span>
      <a th:href="@{/egitmen/kurslarim/{id}/odevler(id=${assignment.courseId})}"
         th:text="${assignment.courseTitle}">Kurs</a> <span class="separator">›</span>
      <span class="current">Ödev Düzenle</span>
    </div>
    <h1><i class="bi bi-pencil-fill"></i> Ödev Düzenle</h1>
    <p style="margin:0;" th:text="${assignment.title}">Ödev Adı</p>
  </div>
</section>

<section class="section">
  <div class="container" style="max-width:680px;">

    <form th:action="@{/egitmen/odevler/{id}(id=${assignment.id})}"
          th:object="${assignmentUpdateRequest}" method="post">

      <div class="form-section">
        <div class="form-section-title"><i class="bi bi-card-text"></i> Ödev Bilgileri</div>

        <div class="form-group">
          <label>Ödev Başlığı</label>
          <input type="text" th:field="*{title}" class="form-control"
                 th:classappend="${#fields.hasErrors('title')} ? ' is-invalid'" maxlength="200">
          <div class="invalid-feedback" th:errors="*{title}" th:if="${#fields.hasErrors('title')}"></div>
        </div>

        <div class="form-group">
          <label>Açıklama / Görev Tanımı</label>
          <textarea th:field="*{description}" class="form-control" rows="5" maxlength="3000"></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Son Teslim Tarihi</label>
            <input type="datetime-local" th:field="*{dueDate}" class="form-control"
                   th:classappend="${#fields.hasErrors('dueDate')} ? ' is-invalid'">
            <div class="invalid-feedback" th:errors="*{dueDate}" th:if="${#fields.hasErrors('dueDate')}"></div>
          </div>
          <div class="form-group">
            <label>Maksimum Puan</label>
            <input type="number" th:field="*{maxScore}" class="form-control"
                   th:classappend="${#fields.hasErrors('maxScore')} ? ' is-invalid'"
                   min="1" max="1000">
            <div class="invalid-feedback" th:errors="*{maxScore}" th:if="${#fields.hasErrors('maxScore')}"></div>
          </div>
        </div>
      </div>

      <div style="display:flex;gap:1rem;align-items:center;flex-wrap:wrap;">
        <button type="submit" class="btn btn-primary btn-lg">
          <i class="bi bi-check-lg"></i> Değişiklikleri Kaydet
        </button>
        <a th:href="@{/egitmen/kurslarim/{id}/odevler(id=${assignment.courseId})}"
           class="btn btn-secondary btn-lg">İptal</a>

        <form th:action="@{/egitmen/odevler/{id}/sil(id=${assignment.id})}" method="post"
              style="margin-left:auto;">
          <button type="submit" class="btn"
                  style="background:#fff5f5;color:#c92a2a;border:1px solid #ffc9c9;"
                  onclick="return confirm('Bu ödevi silmek istediğinize emin misiniz?')">
            <i class="bi bi-trash3"></i> Ödevi Sil
          </button>
        </form>
      </div>

    </form>
  </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
