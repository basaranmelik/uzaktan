<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
  <link rel="icon" type="image/png" th:href="@{/images/gazi-logo.png}">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kurslarım | Gazi Üniversitesi</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<section class="page-header">
  <div class="container">
    <div class="breadcrumb">
      <a th:href="@{/egitmen/panel}">Eğitmen Paneli</a> <span class="separator">›</span>
      <span class="current">Kurslarım</span>
    </div>
    <h1><i class="bi bi-collection-fill"></i> Kurslarım</h1>
    <p style="margin:0;color:var(--text-muted);">
      Toplam <strong th:text="${#lists.size(courses)}">0</strong> kurs
    </p>
  </div>
</section>

<section class="section">
  <div class="container">

    <div th:if="${#lists.isEmpty(courses)}"
         class="text-center" style="padding:4rem;color:var(--text-muted);">
      <div style="font-size:3rem;margin-bottom:1rem;color:var(--primary-600);"><i class="bi bi-collection"></i></div>
      <p>Henüz size atanmış bir kurs bulunmuyor.</p>
    </div>

    <div th:if="${!#lists.isEmpty(courses)}"
         style="overflow-x:auto;border-radius:12px;border:1px solid var(--border);">
      <table class="admin-table">
        <thead>
          <tr>
            <th>Kurs</th>
            <th>Durum</th>
            <th>Öğrenci</th>
            <th>Tarih</th>
            <th>Süre</th>
            <th>İşlem</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="course : ${courses}">
            <td style="max-width:250px;">
              <div style="font-weight:700;" th:text="${course.title}">Kurs</div>
              <div th:if="${course.categoryDisplayName != null}"
                   style="font-size:0.78rem;color:var(--text-muted);margin-top:2px;"
                   th:text="${course.categoryDisplayName}"></div>
            </td>
            <td>
              <span class="status-badge"
                    th:text="${course.status.displayName}"
                    th:classappend="${course.status.name() == 'PUBLISHED'}    ? ' sb-green'  :
                                   (${course.status.name() == 'IN_PROGRESS'}  ? ' sb-teal'   :
                                   (${course.status.name() == 'COMPLETED'}    ? ' sb-blue'   :
                                   (${course.status.name() == 'DRAFT'}        ? ' sb-orange' : ' sb-gray')))">
              </span>
            </td>
            <td style="white-space:nowrap;">
              <span th:text="${course.enrolledCount}">0</span>
              <span th:if="${course.quota != null}" style="color:var(--text-muted);">
                / <span th:text="${course.quota}">0</span>
              </span>
            </td>
            <td style="white-space:nowrap;font-size:0.82rem;color:var(--text-muted);">
              <span th:if="${course.startDate != null}"
                    th:text="${#temporals.format(course.startDate,'dd.MM.yyyy')}"></span>
              <span th:if="${course.endDate != null}">
                — <span th:text="${#temporals.format(course.endDate,'dd.MM.yyyy')}"></span>
              </span>
            </td>
            <td style="white-space:nowrap;color:var(--text-muted);">
              <span th:if="${course.hours != null}" th:text="${course.hours} + ' saat'"></span>
            </td>
            <td>
              <div style="display:flex;gap:0.4rem;flex-wrap:wrap;">
                <a th:href="@{/egitimler/izle/{id}(id=${course.id})}"
                   class="action-btn ab-view">
                  <i class="bi bi-play-circle"></i> Videoları İzle
                </a>
                <a th:href="@{/egitmen/kurslarim/{id}/odevler(id=${course.id})}"
                   class="action-btn ab-edit">
                  <i class="bi bi-journal-text"></i> Ödevler
                </a>
                <a th:href="@{/egitmen/zoom/kurslarim/{id}(id=${course.id})}"
                   class="action-btn ab-zoom">
                  <i class="bi bi-camera-video"></i> Zoom
                </a>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
