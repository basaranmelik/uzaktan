<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="icon" type="image/png" th:href="@{/images/gazi-logo.png}">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duyuru Gönder | Eğitmen Paneli | Gazi Üniversitesi</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        .form-section {
            border:1px solid var(--border); border-radius:12px;
            padding:1.5rem; margin-bottom:1.5rem; background:var(--bg);
        }
        .form-section-title {
            font-size:0.72rem; font-weight:700; text-transform:uppercase;
            letter-spacing:0.8px; color:var(--text-muted); margin:0 0 1.25rem 0;
            padding-bottom:0.75rem; border-bottom:1px solid var(--gray-100);
            display:flex; align-items:center; gap:6px;
        }
        .form-section-title i { font-size:0.9rem; }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<section class="page-header" style="padding: calc(var(--nav-height) + var(--space-xl)) 0 var(--space-xl);">
    <div class="container">
        <div class="breadcrumb">
            <a th:href="@{/egitmen/panel}">Eğitmen Paneli</a> <span class="separator">›</span>
            <span class="current">Duyuru Gönder</span>
        </div>
        <h1><i class="bi bi-megaphone-fill"></i> Öğrencilere Duyuru Gönder</h1>
        <p>Seçtiğiniz kurstaki tüm aktif öğrencilere e-posta ve sistem içi bildirim gönderilir.</p>
    </div>
</section>

<section class="section">
    <div class="container" style="max-width:680px;">
        
        <form th:action="@{/egitmen/duyuru}" th:object="${announcementRequest}" method="post">
            
            <div class="form-section">
                <div class="form-section-title"><i class="bi bi-card-text"></i> Duyuru Bilgileri</div>

                <div class="form-group">
                    <label>Kursa Gönder <span style="color:red">*</span></label>
                    <select class="form-control" th:field="*{courseId}" required>
                        <option value="" disabled selected>Lütfen bir kurs seçin...</option>
                        <option th:each="course : ${courses}" th:value="${course.id}" th:text="${course.title}"></option>
                    </select>
                    <div class="invalid-feedback" th:errors="*{courseId}" th:if="${#fields.hasErrors('courseId')}"></div>
                    <div th:if="${#lists.isEmpty(courses)}" style="color:var(--text-muted); font-size:0.9rem; margin-top:5px;">
                        Size atanmış kurs bulunmuyor.
                    </div>
                </div>

                <div class="form-group">
                    <label>Duyuru Başlığı <span style="color:red">*</span></label>
                    <input type="text" th:field="*{subject}" class="form-control"
                           th:classappend="${#fields.hasErrors('subject')} ? ' is-invalid'"
                           placeholder="Örn: Hafta Sonu Dersi Hakkında" maxlength="200" required>
                    <div class="invalid-feedback" th:errors="*{subject}" th:if="${#fields.hasErrors('subject')}"></div>
                </div>

                <div class="form-group">
                    <label>Duyuru Metni <span style="color:red">*</span></label>
                    <textarea th:field="*{message}" class="form-control" rows="6"
                              th:classappend="${#fields.hasErrors('message')} ? ' is-invalid'"
                              placeholder="Mesajınızı detaylı şekilde buraya yazın..." maxlength="5000" required></textarea>
                    <div class="invalid-feedback" th:errors="*{message}" th:if="${#fields.hasErrors('message')}"></div>
                </div>
            </div>

            <div style="display:flex; gap:1rem;">
                <button type="submit" class="btn btn-primary btn-lg" th:disabled="${#lists.isEmpty(courses)}">
                    <i class="bi bi-send-fill"></i> Tüm Öğrencilere Gönder
                </button>
                <a th:href="@{/egitmen/panel}" class="btn btn-secondary btn-lg">İptal</a>
            </div>
        </form>

    </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
