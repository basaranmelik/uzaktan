<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
  <link rel="icon" type="image/png" th:href="@{/images/gazi-logo.png}">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soru Düzenle | Gazi Üniversitesi</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<section class="page-header">
  <div class="container">
    <div class="breadcrumb">
      <a th:href="@{/egitmen/panel}">Eğitmen Paneli</a> <span class="separator">›</span>
      <a th:href="@{/egitmen/kurslarim}">Kurslarım</a> <span class="separator">›</span>
      <a th:href="@{/egitmen/kurslarim/{id}/soru-bankasi(id=${question.courseId})}"
         th:text="${question.courseTitle}">Kurs</a> <span class="separator">›</span>
      <span class="current">Soruyu Düzenle</span>
    </div>
    <h1><i class="bi bi-pencil-fill"></i> Soruyu Düzenle</h1>
    <p style="margin:0;" th:text="${question.courseTitle}">Kurs Adı</p>
  </div>
</section>

<section class="section">
  <div class="container" style="max-width:780px;">

    <form th:action="@{/egitmen/sorular/{id}(id=${question.id})}"
          th:object="${questionUpdateRequest}" method="post" enctype="multipart/form-data">

      <!-- Modül Seçimi -->
      <div class="form-section">
        <div class="form-section-title"><i class="bi bi-collection-fill"></i> Modül</div>
        <div class="form-group">
          <label>Modül seçiniz <span style="color: red;">*</span></label>
          <select th:field="*{moduleIndex}" class="form-control"
                  th:classappend="${#fields.hasErrors('moduleIndex')} ? ' is-invalid' : ''" required>
            <option value="">-- Modül Seçiniz --</option>
            <th:block th:utext="${#strings.isEmpty(moduleOptions) ? '' : moduleOptions}"></th:block>
          </select>
          <div class="invalid-feedback" th:errors="*{moduleIndex}" th:if="${#fields.hasErrors('moduleIndex')}"></div>
        </div>
      </div>

      <!-- Soru Metni -->
      <div class="form-section">
        <div class="form-section-title"><i class="bi bi-chat-left-text-fill"></i> Soru Metni</div>
        <div class="form-group">
          <label>Soru *</label>
          <textarea th:field="*{questionText}" class="form-control" rows="4"
                    th:classappend="${#fields.hasErrors('questionText')} ? ' is-invalid'"
                    placeholder="Sorunuzu buraya yazın..." maxlength="5000" required></textarea>
          <div class="invalid-feedback" th:errors="*{questionText}" th:if="${#fields.hasErrors('questionText')}"></div>
        </div>
      </div>

      <!-- Medya (Opsiyonel) -->
      <div class="form-section">
        <div class="form-section-title"><i class="bi bi-paperclip"></i> Medya (Opsiyonel)</div>
        <div class="form-row">
          <div class="form-group">
            <label>Fotoğraf <span style="color:var(--text-muted);font-weight:400;">(maks. 5 MB)</span></label>
            <input type="file" name="image" class="form-control" accept="image/jpeg,image/png,image/webp,image/gif">
            <div th:if="${question.imagePath != null}" style="margin-top:0.5rem;">
              <img th:src="@{'/uploads/' + ${question.imagePath}}" style="max-height:80px;border-radius:6px;border:1px solid var(--border);" alt="Mevcut görsel">
              <small style="color:var(--text-muted);display:block;">Yeni dosya seçilmezse mevcut görsel korunur.</small>
            </div>
          </div>
          <div class="form-group">
            <label>Video <span style="color:var(--text-muted);font-weight:400;">(maks. 50 MB)</span></label>
            <input type="file" name="video" class="form-control" accept="video/mp4,video/webm,video/ogg">
            <div th:if="${question.videoPath != null}" style="margin-top:0.5rem;">
              <small style="color:var(--text-muted);display:block;">Mevcut video yüklü.</small>
            </div>
          </div>
        </div>
      </div>

      <!-- Şıklar -->
      <div class="form-section">
        <div class="form-section-title"><i class="bi bi-list-check"></i> Şıklar</div>

        <div class="options-grid">
          <div class="opt-card">
            <span class="opt-card-badge">A</span>
            <div class="opt-card-body">
              <input type="text" th:field="*{optionA}" class="form-control opt-input"
                     th:classappend="${#fields.hasErrors('optionA')} ? 'is-invalid' : ''"
                     placeholder="A şıkkı..." maxlength="500" required>
              <div th:if="${#fields.hasErrors('optionA')}" class="opt-error" th:errors="*{optionA}"></div>
            </div>
          </div>

          <div class="opt-card">
            <span class="opt-card-badge">B</span>
            <div class="opt-card-body">
              <input type="text" th:field="*{optionB}" class="form-control opt-input"
                     th:classappend="${#fields.hasErrors('optionB')} ? 'is-invalid' : ''"
                     placeholder="B şıkkı..." maxlength="500" required>
              <div th:if="${#fields.hasErrors('optionB')}" class="opt-error" th:errors="*{optionB}"></div>
            </div>
          </div>

          <div class="opt-card">
            <span class="opt-card-badge">C</span>
            <div class="opt-card-body">
              <input type="text" th:field="*{optionC}" class="form-control opt-input"
                     th:classappend="${#fields.hasErrors('optionC')} ? 'is-invalid' : ''"
                     placeholder="C şıkkı..." maxlength="500" required>
              <div th:if="${#fields.hasErrors('optionC')}" class="opt-error" th:errors="*{optionC}"></div>
            </div>
          </div>

          <div class="opt-card">
            <span class="opt-card-badge">D</span>
            <div class="opt-card-body">
              <input type="text" th:field="*{optionD}" class="form-control opt-input"
                     th:classappend="${#fields.hasErrors('optionD')} ? 'is-invalid' : ''"
                     placeholder="D şıkkı..." maxlength="500" required>
              <div th:if="${#fields.hasErrors('optionD')}" class="opt-error" th:errors="*{optionD}"></div>
            </div>
          </div>

          <div class="opt-card">
            <span class="opt-card-badge">E</span>
            <div class="opt-card-body">
              <input type="text" th:field="*{optionE}" class="form-control opt-input"
                     th:classappend="${#fields.hasErrors('optionE')} ? 'is-invalid' : ''"
                     placeholder="E şıkkı..." maxlength="500" required>
              <div th:if="${#fields.hasErrors('optionE')}" class="opt-error" th:errors="*{optionE}"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Doğru Cevap -->
      <div class="form-section">
        <div class="form-section-title"><i class="bi bi-check-circle-fill"></i> Doğru Cevap</div>
        <div class="form-group">
          <label>Doğru şıkkı seçin <span style="color: red;">*</span></label>
          <div class="correct-selector">
            <span th:each="opt : ${correctOptions}">
              <input type="radio" th:field="*{correctOption}" th:value="${opt.name()}" th:id="${'opt_' + opt.name()}">
              <label th:for="${'opt_' + opt.name()}" th:text="${opt.displayName}">A</label>
            </span>
          </div>
          <div class="invalid-feedback" th:errors="*{correctOption}" th:if="${#fields.hasErrors('correctOption')}"
               style="display:block;margin-top:0.5rem;"></div>
        </div>
      </div>

      <!-- Açıklama -->
      <div class="form-section">
        <div class="form-section-title"><i class="bi bi-lightbulb-fill"></i> Açıklama (İsteğe Bağlı)</div>
        <div class="form-group">
          <label>Doğru cevabın açıklaması</label>
          <textarea th:field="*{explanation}" class="form-control" rows="3"
                    placeholder="Doğru cevabı neden bu şık olduğunu açıklayın..." maxlength="5000"></textarea>
        </div>
      </div>

      <div style="display:flex;gap:1rem;">
        <button type="submit" class="btn btn-primary btn-lg">
          <i class="bi bi-check-lg"></i> Değişiklikleri Kaydet
        </button>
        <a th:href="@{/egitmen/kurslarim/{id}/soru-bankasi(id=${question.courseId})}"
           class="btn btn-secondary btn-lg">İptal</a>
      </div>
    </form>

  </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
