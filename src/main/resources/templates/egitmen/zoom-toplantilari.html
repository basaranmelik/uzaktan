<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
  <link rel="icon" type="image/png" th:href="@{/images/gazi-logo.png}">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zoom Toplantıları | Gazi Üniversitesi</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    .meeting-card {
      display:flex; justify-content:space-between; align-items:flex-start;
      flex-wrap:wrap; gap:1rem; padding:1.25rem 1.5rem;
      border:1px solid var(--border); border-radius:12px;
      background:var(--bg); margin-bottom:0.75rem;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .meeting-card:hover { border-color:var(--primary-300); box-shadow:0 2px 12px rgba(0,0,0,0.06); }
    .meeting-card.cancelled { opacity:0.55; }
    .meeting-card.live { border-color:#2b8a3e; background:#f0fdf4; }
    .meeting-card.past { background:var(--bg-secondary); }
    .live-pulse {
      display:inline-flex; align-items:center; gap:5px;
      background:#2b8a3e; color:#fff; font-size:0.72rem;
      font-weight:700; padding:2px 9px; border-radius:20px;
    }
    .live-dot {
      width:7px; height:7px; border-radius:50%; background:#fff;
      animation: pulse 1s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .section-header {
      font-size:0.72rem; font-weight:700; text-transform:uppercase;
      letter-spacing:0.8px; color:var(--text-muted); margin:1.5rem 0 0.75rem;
      padding-bottom:0.5rem; border-bottom:1px solid var(--gray-100);
    }
    .copy-btn {
      background:none; border:1px solid var(--border); border-radius:7px;
      padding:0.3rem 0.7rem; font-size:0.78rem; color:var(--text-alt);
      cursor:pointer; display:inline-flex; align-items:center; gap:4px;
      transition: all 0.15s;
    }
    .copy-btn:hover { border-color:var(--primary-400); color:var(--primary-600); }
    .recording-form { display:flex; gap:0.5rem; margin-top:0.5rem; flex-wrap:wrap; }
    .recording-form input {
      flex:1; min-width:200px; padding:0.35rem 0.75rem;
      border:1px solid var(--border); border-radius:8px; font-size:0.84rem;
    }
  </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<section class="page-header">
  <div class="container">
    <div class="breadcrumb">
      <a th:href="@{/egitmen/panel}">Eğitmen Paneli</a>
      <span class="separator">›</span>
      <span class="current" th:text="${course.title}">Kurs</span>
    </div>
    <h1><i class="bi bi-camera-video-fill"></i> Zoom Toplantıları</h1>
    <p th:text="${course.title}">Kurs adı</p>
  </div>
</section>

<section class="section">
  <div class="container">

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
      <h3 style="margin:0;">Toplantılar</h3>
      <a th:href="@{/egitmen/zoom/kurslarim/{id}/yeni(id=${course.id})}" class="btn btn-primary">
        <i class="bi bi-plus-circle"></i> Yeni Toplantı Oluştur
      </a>
    </div>

    <!-- Toplantı yok -->
    <div th:if="${#lists.isEmpty(meetings)}"
         style="padding:4rem;text-align:center;color:var(--text-muted);">
      <div style="font-size:3rem;margin-bottom:1rem;color:var(--primary-600);"><i class="bi bi-camera-video"></i></div>
      <p>Bu kurs için henüz Zoom toplantısı oluşturulmadı.</p>
    </div>

    <!-- Yaklaşan / Aktif toplantılar -->
    <div th:if="${!#lists.isEmpty(meetings)}">
      <div th:with="upcoming=${meetings.?[status.name() == 'SCHEDULED' and !past]}">
        <div th:if="${!#lists.isEmpty(upcoming)}" class="section-header">
          <i class="bi bi-clock-history"></i> Yaklaşan Toplantılar
        </div>
        <div th:each="m : ${upcoming}" th:classappend="${m.live} ? ' live'" class="meeting-card">
          <div style="flex:1;min-width:0;">
            <div style="display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;margin-bottom:0.5rem;">
              <span style="font-weight:700;font-size:1.05rem;" th:text="${m.topic}">Konu</span>
              <span th:if="${m.live}" class="live-pulse">
                <span class="live-dot"></span> CANLI
              </span>
              <span th:unless="${m.live}"
                    style="padding:0.2rem 0.65rem;border-radius:20px;font-size:0.78rem;font-weight:600;background:#d3f9d8;color:#2b8a3e;"
                    th:text="${m.statusDisplayName}"></span>
            </div>
            <div style="display:flex;gap:1.5rem;flex-wrap:wrap;font-size:0.84rem;color:var(--text-muted);margin-bottom:0.5rem;">
              <span><i class="bi bi-calendar-event"></i>
                <span th:text="${#temporals.format(m.scheduledAt, 'dd.MM.yyyy HH:mm')}">-</span>
              </span>
              <span><i class="bi bi-clock"></i> <span th:text="${m.durationMinutes}">0</span> dakika</span>
              <span th:if="${m.password != null and !#strings.isEmpty(m.password)}">
                <i class="bi bi-lock-fill"></i> Şifre: <code th:text="${m.password}">-</code>
              </span>
            </div>
            <!-- Öğrenci katılma linkini kopyala -->
            <button class="copy-btn"
                    th:data-url="@{/zoom/toplanti/{id}/katil(id=${m.id})}"
                    onclick="copyJoinLink(this)">
              <i class="bi bi-link-45deg"></i> Öğrenci Linkini Kopyala
            </button>
          </div>
          <div style="display:flex;gap:0.5rem;flex-wrap:wrap;flex-shrink:0;">
            <a th:href="${m.startUrl}" target="_blank" class="btn btn-primary"
               style="font-size:0.85rem;padding:0.4rem 1rem;">
              <i class="bi bi-camera-video-fill"></i> Başlat
            </a>
            <a th:href="@{/egitmen/zoom/toplanti/{id}/duzenle(id=${m.id})}" class="btn btn-secondary"
               style="font-size:0.85rem;padding:0.4rem 1rem;">
              <i class="bi bi-pencil"></i> Düzenle
            </a>
            <form th:action="@{/egitmen/zoom/toplanti/{id}/iptal(id=${m.id})}" method="post"
                  onsubmit="return confirm('Bu toplantıyı iptal etmek istediğinizden emin misiniz?')">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
              <button type="submit" class="btn btn-secondary"
                      style="font-size:0.85rem;padding:0.4rem 1rem;color:#e03131;">
                <i class="bi bi-x-circle"></i> İptal
              </button>
            </form>
          </div>
        </div>
      </div>

      <!-- Geçmiş toplantılar -->
      <div th:with="past=${meetings.?[past or status.name() == 'CANCELLED']}">
        <div th:if="${!#lists.isEmpty(past)}" class="section-header" style="margin-top:2rem;">
          <i class="bi bi-archive"></i> Geçmiş Toplantılar
        </div>
        <div th:each="m : ${past}"
             th:classappend="${m.status.name() == 'CANCELLED'} ? ' cancelled' : ' past'"
             class="meeting-card">
          <div style="flex:1;min-width:0;">
            <div style="display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;margin-bottom:0.4rem;">
              <span style="font-weight:600;font-size:1.05rem;" th:text="${m.topic}">Konu</span>
              <span th:if="${m.status.name() == 'CANCELLED'}"
                    style="padding:0.2rem 0.65rem;border-radius:20px;font-size:0.78rem;font-weight:600;background:#f1f3f5;color:#868e96;">
                İptal Edildi
              </span>
              <span th:if="${m.past and m.status.name() != 'CANCELLED'}"
                    style="padding:0.2rem 0.65rem;border-radius:20px;font-size:0.78rem;font-weight:600;background:#e9ecef;color:#495057;">
                Tamamlandı
              </span>
            </div>
            <div style="display:flex;gap:1.5rem;flex-wrap:wrap;font-size:0.84rem;color:var(--text-muted);margin-bottom:0.5rem;">
              <span><i class="bi bi-calendar-event"></i>
                <span th:text="${#temporals.format(m.scheduledAt, 'dd.MM.yyyy HH:mm')}">-</span>
              </span>
              <span><i class="bi bi-clock"></i> <span th:text="${m.durationMinutes}">0</span> dakika</span>
            </div>
            <!-- Kayıt linki -->
            <div th:if="${m.recordingUrl != null and !#strings.isEmpty(m.recordingUrl)}"
                 style="font-size:0.84rem;margin-bottom:0.5rem;">
              <i class="bi bi-play-circle-fill" style="color:var(--primary-600);"></i>
              <a th:href="${m.recordingUrl}" target="_blank"
                 style="color:var(--primary-600);font-weight:600;">Kaydı İzle</a>
            </div>
            <!-- Kayıt linki ekle (sadece tamamlanmış, iptal edilmemiş) -->
            <div th:if="${m.past and m.status.name() != 'CANCELLED'}">
              <form th:action="@{/egitmen/zoom/toplanti/{id}/kayit(id=${m.id})}" method="post"
                    class="recording-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="url" name="recordingUrl"
                       th:value="${m.recordingUrl}"
                       placeholder="Kayıt linkini yapıştırın (Zoom Cloud, Drive vb.)">
                <button type="submit" class="btn btn-secondary" style="font-size:0.82rem;padding:0.35rem 0.8rem;">
                  <i class="bi bi-save"></i> Kaydet
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
<script>
function copyJoinLink(btn) {
  const path = btn.dataset.url;
  const fullUrl = window.location.origin + path;
  navigator.clipboard.writeText(fullUrl).then(() => {
    const orig = btn.innerHTML;
    btn.innerHTML = '<i class="bi bi-check-lg"></i> Kopyalandı!';
    btn.style.borderColor = '#2b8a3e';
    btn.style.color = '#2b8a3e';
    setTimeout(() => { btn.innerHTML = orig; btn.style.borderColor = ''; btn.style.color = ''; }, 2000);
  });
}
</script>
</body>
</html>
