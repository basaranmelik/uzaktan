<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
  <link rel="icon" type="image/png" th:href="@{/images/gazi-logo.png}">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zoom Toplantıları | Gazi Üniversitesi</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<section class="page-header">
  <div class="container">
    <div class="breadcrumb">
      <a th:href="@{/egitmen/panel}">Eğitmen Paneli</a>
      <span class="separator">›</span>
      <span class="current" th:text="${course.title}">Kurs</span>
    </div>
    <h1><i class="bi bi-camera-video-fill"></i> Zoom Toplantıları</h1>
    <p th:text="${course.title}">Kurs adı</p>
  </div>
</section>

<section class="section">
  <div class="container">

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
      <h3 style="margin:0;">Toplantılar</h3>
      <a th:href="@{/egitmen/zoom/kurslarim/{id}/yeni(id=${course.id})}"
         class="btn btn-primary">
        <i class="bi bi-plus-circle"></i> Yeni Toplantı Oluştur
      </a>
    </div>

    <!-- Toplantı yok -->
    <div th:if="${#lists.isEmpty(meetings)}"
         class="text-center" style="padding:4rem;color:var(--text-muted);">
      <div style="font-size:3rem;margin-bottom:1rem;color:var(--primary-600);"><i class="bi bi-camera-video"></i></div>
      <p>Bu kurs için henüz Zoom toplantısı oluşturulmadı.</p>
    </div>

    <!-- Toplantı listesi -->
    <div th:if="${!#lists.isEmpty(meetings)}"
         style="display:flex;flex-direction:column;gap:0.75rem;">

      <div th:each="m : ${meetings}" class="card fade-in"
           th:style="${m.status.name() == 'CANCELLED'} ? 'padding:1.25rem 1.5rem;opacity:0.6;' : 'padding:1.25rem 1.5rem;'"
           style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:1rem;">

        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;margin-bottom:0.4rem;">
            <span style="font-weight:600;font-size:1.05rem;" th:text="${m.topic}">Konu</span>
            <span style="padding:0.2rem 0.65rem;border-radius:20px;font-size:0.78rem;font-weight:600;"
                  th:text="${m.statusDisplayName}"
                  th:style="${m.status.name() == 'SCHEDULED'} ? 'background:#d3f9d8;color:#2b8a3e;' : 'background:#f1f3f5;color:#868e96;'">
            </span>
          </div>
          <div style="display:flex;gap:1.5rem;flex-wrap:wrap;font-size:0.84rem;color:var(--text-muted);">
            <span><i class="bi bi-calendar-event"></i>
              <span th:text="${#temporals.format(m.scheduledAt, 'dd.MM.yyyy HH:mm')}">-</span>
            </span>
            <span><i class="bi bi-clock"></i> <span th:text="${m.durationMinutes}">0</span> dakika</span>
            <span th:if="${m.password != null and !#strings.isEmpty(m.password)}">
              <i class="bi bi-lock-fill"></i> Şifre: <code th:text="${m.password}">-</code>
            </span>
          </div>
        </div>

        <div th:if="${m.status.name() == 'SCHEDULED'}"
             style="display:flex;gap:0.5rem;flex-wrap:wrap;flex-shrink:0;">
          <a th:href="${m.startUrl}" target="_blank" class="btn btn-primary"
             style="font-size:0.85rem;padding:0.4rem 1rem;">
            <i class="bi bi-camera-video-fill"></i> Toplantıyı Başlat
          </a>
          <form th:action="@{/egitmen/zoom/toplanti/{id}/iptal(id=${m.id})}" method="post"
                onsubmit="return confirm('Bu toplantıyı iptal etmek istediğinizden emin misiniz?')">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="btn btn-secondary"
                    style="font-size:0.85rem;padding:0.4rem 1rem;color:#e03131;">
              <i class="bi bi-x-circle"></i> İptal Et
            </button>
          </form>
        </div>

        <div th:if="${m.status.name() == 'CANCELLED'}"
             style="font-size:0.85rem;color:#868e96;font-style:italic;padding-top:0.25rem;">
          İptal edildi
        </div>

      </div>
    </div>

  </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
