<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
  <link rel="icon" type="image/png" th:href="@{/images/gazi-logo.png}">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${course.title} + ' — Ödevler'">Kurs Ödevleri</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<section class="page-header">
  <div class="container">
    <div class="breadcrumb">
      <a th:href="@{/egitmen/panel}">Eğitmen Paneli</a> <span class="separator">›</span>
      <a th:href="@{/egitmen/kurslarim}">Kurslarım</a> <span class="separator">›</span>
      <span class="current" th:text="${course.title}">Kurs</span>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:1rem;">
      <div>
        <h1><i class="bi bi-journal-text"></i> Ödevler</h1>
        <p style="margin:0;" th:text="${course.title}">Kurs Adı</p>
      </div>
      <a th:href="@{/egitmen/kurslarim/{id}/odevler/yeni(id=${course.id})}"
         class="btn btn-primary">
        <i class="bi bi-plus-lg"></i> Yeni Ödev
      </a>
    </div>
  </div>
</section>

<section class="section">
  <div class="container">



    <div th:if="${#lists.isEmpty(assignments)}"
         class="text-center" style="padding:4rem;color:var(--text-muted);">
      <div style="font-size:3rem;margin-bottom:1rem;"><i class="bi bi-journal-plus"></i></div>
      <p>Bu kursa henüz ödev eklenmemiş.</p>
      <a th:href="@{/egitmen/kurslarim/{id}/odevler/yeni(id=${course.id})}"
         class="btn btn-primary" style="margin-top:1rem;">
        İlk Ödevi Ekle →
      </a>
    </div>

    <div th:if="${!#lists.isEmpty(assignments)}"
         style="overflow-x:auto;border-radius:12px;border:1px solid var(--border);">
      <table class="admin-table">
        <thead>
          <tr>
            <th>Ödev Başlığı</th>
            <th>Son Tarih</th>
            <th>Maks Puan</th>
            <th>Teslim</th>
            <th>Bekleyen</th>
            <th>İşlem</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="a : ${assignments}">

            <td>
              <div style="font-weight:600;" th:text="${a.title}">Ödev</div>
              <div th:if="${a.description != null and !#strings.isEmpty(a.description)}"
                   style="font-size:0.78rem;color:var(--text-muted);margin-top:2px;max-width:300px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"
                   th:text="${a.description}"></div>
            </td>

            <td style="white-space:nowrap;">
              <span th:if="${a.dueDate != null}"
                    th:text="${#temporals.format(a.dueDate,'dd.MM.yyyy HH:mm')}"
                    th:style="${a.dueDate.isBefore(#temporals.createNow())} ? 'color:#c92a2a;font-weight:600;' : ''">
              </span>
              <span th:if="${a.dueDate == null}" style="color:var(--text-muted);">—</span>
            </td>

            <td th:text="${a.maxScore} + ' puan'" style="white-space:nowrap;"></td>

            <td>
              <span class="status-badge sb-blue" th:text="${a.submissionCount}">0</span>
            </td>

            <td>
              <span th:if="${a.pendingGradeCount > 0}"
                    class="status-badge sb-orange"
                    th:text="${a.pendingGradeCount}">0</span>
              <span th:if="${a.pendingGradeCount == 0}"
                    class="status-badge sb-green"><i class="bi bi-check-lg"></i></span>
            </td>

            <td>
              <div style="display:flex;gap:0.4rem;flex-wrap:wrap;">
                <a th:href="@{/egitmen/odevler/{id}/teslimler(id=${a.id})}"
                   class="action-btn ab-view">
                  <i class="bi bi-people"></i> Teslimler
                </a>
                <a th:href="@{/egitmen/odevler/{id}/duzenle(id=${a.id})}"
                   class="action-btn ab-edit">
                  <i class="bi bi-pencil"></i>
                </a>
                <form th:action="@{/egitmen/odevler/{id}/sil(id=${a.id})}" method="post">
                  <button type="submit" class="action-btn ab-del confirm-delete-btn">
                    <i class="bi bi-trash3"></i>
                  </button>
                </form>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
