<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
  <link rel="icon" type="image/png" th:href="@{/images/gazi-logo.png}">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="GUZEM platformuna ücretsiz kayıt olun.">
    <title>Kayıt Ol | Gazi Üniversitesi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="auth-page">

<img th:src="@{/images/gazi-logo.png}" alt="" class="bg-watermark">

<a th:href="@{/}" class="back-home">← Ana Sayfaya Dön</a>

<div class="auth-card">

    <a th:href="@{/}" class="auth-logo">
        <img th:src="@{/images/gazi-logo.png}" alt="Gazi Üniversitesi">
        <div class="auth-logo-divider"></div>
        <span>GUZEM</span>
    </a>

    <div class="auth-title">
        <h1>Ücretsiz Üye Ol</h1>
        <p>Eğitimlere erişim için hesabınızı oluşturun.</p>
    </div>

    <div th:replace="~{fragments/auth-alerts :: authAlertsRegister}"></div>

    <form th:action="@{/kayit-ol}" th:object="${registerRequest}" method="post">

        <div class="form-row-2">
            <div class="form-field">
                <label for="firstName">Ad</label>
                <input type="text" id="firstName" th:field="*{firstName}"
                       th:classappend="${#fields.hasErrors('firstName')} ? ' is-invalid'"
                       placeholder="Adınız" maxlength="100" required>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('firstName')}"
                     th:errors="*{firstName}"></div>
            </div>
            <div class="form-field">
                <label for="lastName">Soyad</label>
                <input type="text" id="lastName" th:field="*{lastName}"
                       th:classappend="${#fields.hasErrors('lastName')} ? ' is-invalid'"
                       placeholder="Soyadınız" maxlength="100" required>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('lastName')}"
                     th:errors="*{lastName}"></div>
            </div>
        </div>

        <div class="form-field">
            <label for="email">E-posta</label>
            <input type="email" id="email" th:field="*{email}"
                   th:classappend="${#fields.hasErrors('email')} ? ' is-invalid'"
                   placeholder="ornek@gazi.edu.tr" maxlength="255" required>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}"
                 th:errors="*{email}"></div>
        </div>

        <div class="form-row-2">
            <div class="form-field">
                <label for="phoneNumber">Telefon <span style="color:rgba(255,255,255,0.35);font-weight:400;">(Opsiyonel)</span></label>
                <input type="tel" id="phoneNumber" th:field="*{phoneNumber}"
                       th:classappend="${#fields.hasErrors('phoneNumber')} ? ' is-invalid'"
                       placeholder="+90 5XX XXX XX XX">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('phoneNumber')}"
                     th:errors="*{phoneNumber}"></div>
            </div>

            <div class="form-field">
                <label for="birthDate">Doğum Tarihi</label>
                <input type="date" id="birthDate" th:field="*{birthDate}"
                       th:max="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}"
                       th:classappend="${#fields.hasErrors('birthDate')} ? ' is-invalid'" required>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('birthDate')}"
                     th:errors="*{birthDate}"></div>
            </div>
        </div>

        <div class="form-row-2">
            <div class="form-field">
                <label for="password">Şifre</label>
                <input type="password" id="password" th:field="*{password}"
                       th:classappend="${#fields.hasErrors('password')} ? ' is-invalid'"
                       placeholder="Şifrenizi belirleyin" maxlength="128" required>
                <p style="font-size: 11px; color: rgba(255,255,255,0.5); margin: 5px 0 0 0;">
                    Büyük/küçük harf, rakam, özel karakter (@$!%*?&) (min. 8)
                </p>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}"
                     th:errors="*{password}"></div>
            </div>
            <div class="form-field">
                <label for="confirmPassword">Şifre Tekrar</label>
                <input type="password" id="confirmPassword" th:field="*{confirmPassword}"
                       th:classappend="${#fields.hasErrors('confirmPassword')} ? ' is-invalid'"
                       placeholder="Şifrenizi tekrar girin" maxlength="128" required>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('confirmPassword')}"
                     th:errors="*{confirmPassword}"></div>
            </div>
        </div>

        <button type="submit" class="btn-auth" style="margin-top:8px;">Kayıt Ol</button>
    </form>

    <div class="auth-footer">
        Zaten hesabınız var mı? <a th:href="@{/giris}">Giriş Yapın</a>
    </div>

</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
