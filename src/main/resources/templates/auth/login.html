<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
  <link rel="icon" type="image/png" th:href="@{/images/gazi-logo.png}">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="GUZEM platformuna giriş yapın.">
    <title>Giriş Yap | Gazi Üniversitesi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="auth-page">

<img th:src="@{/images/gazi-logo.png}" alt="" class="bg-watermark">

<a th:href="@{/}" class="back-home">← Ana Sayfaya Dön</a>

<div class="auth-card">

    <a th:href="@{/}" class="auth-logo">
        <img th:src="@{/images/gazi-logo.png}" alt="Gazi Üniversitesi">
        <div class="auth-logo-divider"></div>
        <span>GUZEM</span>
    </a>

    <div class="auth-title">
        <h1>Hesabınıza Giriş Yapın</h1>
        <p>Eğitimlere erişmek için giriş yapın.</p>
    </div>

    <button type="button" class="btn-edevlet data-demo-alert">
        <svg width="28" height="22" viewBox="28 18 54 44" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <mask id="crescentMask">
              <rect x="0" y="0" width="120" height="80" fill="white" />
              <circle cx="56.25" cy="40" r="16" fill="black" />
            </mask>
          </defs>
          <circle cx="50" cy="40" r="20" fill="white" mask="url(#crescentMask)"/>
          <polygon points="80,40 68.2,36.2 76.6,46.2 72.5,31.5 72.5,48.5 76.6,33.8 68.2,43.8" fill="white"/>
        </svg>
        e-Devlet ile Giriş Yap
    </button>

    <div class="divider"><span>veya sistem girişi</span></div>

    <div th:replace="~{fragments/auth-alerts :: authAlerts}"></div>

    <form th:action="@{/giris}" method="post">
        <input type="hidden" name="sonra" th:value="${param.sonra}"/>

        <div class="form-field">
            <label for="email">E-posta</label>
            <input type="email" id="email" name="email"
                   placeholder="E-posta adresinizi girin" maxlength="255" required autofocus>
        </div>

        <div class="form-field">
            <label for="password">Şifre</label>
            <input type="password" id="password" name="password"
                   placeholder="••••••••" maxlength="128" required>
        </div>

        <div class="form-options">
            <label class="remember-me">
                <input type="checkbox" name="remember-me">
                <span>Beni hatırla</span>
            </label>
        </div>

        <button type="submit" class="btn-auth">Giriş Yap</button>
    </form>

    <div class="register-box">
        <p>Sistemde henüz kaydınız yok mu?</p>
        <a th:href="@{/kayit-ol}" class="btn-register-outline">Ücretsiz Kayıt Ol</a>
    </div>

</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
