<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
  <link rel="icon" type="image/png" th:href="@{/images/gazi-logo.png}">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ödevlerim | Gazi Üniversitesi</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}" th:with="activeMenu='assignments'"></div>

<section class="page-header">
  <div class="container">
    <h1><i class="bi bi-journal-check"></i> Ödevlerim</h1>
    <p>Kayıtlı olduğunuz kurslara ait tüm ödevler.</p>
  </div>
</section>

<section class="section">
  <div class="container">

    <div th:if="${#lists.isEmpty(assignments)}"
         class="text-center" style="padding:4rem;color:var(--text-muted);">
      <div style="font-size:3rem;margin-bottom:1rem;"><i class="bi bi-journal"></i></div>
      <p>Henüz ödev bulunmuyor.</p>
      <a th:href="@{/egitimler}" class="btn btn-primary" style="margin-top:1rem;">Eğitimleri Keşfet →</a>
    </div>

    <div th:if="${!#maps.isEmpty(assignmentsByCourse)}"
         style="display:flex;flex-direction:column;gap:2rem;">

      <!-- Kurs Bazlı Kartlama -->
      <div th:each="courseEntry : ${assignmentsByCourse}" class="card fade-in" style="padding:0; border:1px solid #ced4da; overflow:hidden; border-radius:12px; box-shadow:0 4px 15px rgba(0,0,0,0.03);">
        
        <!-- Kurs Üst Mavi Bar -->
        <div style="background:linear-gradient(90deg, #f8f9fa 0%, #ffffff 100%); padding:1.25rem 1.5rem; border-bottom:1px solid rgba(0,0,0,0.05); display:flex; align-items:center; gap:0.75rem;">
           <div style="width:40px; height:40px; border-radius:50%; background:var(--primary-100); color:var(--primary-600); display:flex; align-items:center; justify-content:center; font-size:1.2rem;">
             <i class="bi bi-journal-bookmark-fill"></i>
           </div>
           <div>
             <div style="font-size:0.75rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; font-weight:600;">Eğitim</div>
             <h3 style="margin:0; font-size:1.2rem; color:var(--primary-900); font-weight:700;" th:text="${courseEntry.key}">Kurs Adı</h3>
           </div>
        </div>

        <!-- O Kurs İçindeki Alt Ödev Kartları -->
        <div style="padding:1.5rem; display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:1rem; background:#ffffff;">

          <div th:each="a : ${courseEntry.value}" style="border:1px solid #ced4da; border-radius:12px; padding:1.25rem; transition:transform 0.2s, box-shadow 0.2s; background:#fdfdfd; display:flex; flex-direction:column;" class="task-card" onmouseover="this.style.transform='translateY(-3px)'; this.style.boxShadow='0 6px 15px rgba(0,0,0,0.04)'; this.style.borderColor='var(--primary-300)';" onmouseout="this.style.transform='none'; this.style.boxShadow='none'; this.style.borderColor='#ced4da';">
            
            <h4 style="margin:0 0 0.5rem; font-size:1.1rem; color:var(--text); flex:1;" th:text="${a.title}">Ödev Başlığı</h4>
            <div th:style="'font-size:0.8rem;margin-bottom:1rem;display:flex;align-items:center;gap:0.4rem;padding-bottom:0.5rem;border-bottom:1px dashed rgba(0,0,0,0.1);' + (${a.dueDate.isBefore(#temporals.createNow())} ? 'color:#e03131;font-weight:600;' : 'color:var(--primary-600);font-weight:500;')">
              <i class="bi bi-clock-history"></i> Teslim: <span th:text="${#temporals.format(a.dueDate, 'dd.MM.yyyy HH:mm')}">Tarih</span>
            </div>

            <!-- Teslim Durumu Rozetleri -->
            <div style="margin-bottom:1.25rem; font-size:0.8rem;" th:with="sub=${submissionByAssignment[a.id]}">
              <span th:if="${sub == null and a.dueDate.isBefore(#temporals.createNow())}"
                    style="padding:0.3rem 0.8rem; border-radius:20px; font-weight:600; background:#fff5f5; color:#e03131;">
                <i class="bi bi-x-circle-fill"></i> Süre Doldu
              </span>
              <span th:if="${sub == null and !a.dueDate.isBefore(#temporals.createNow())}"
                    style="padding:0.3rem 0.8rem; border-radius:20px; font-weight:600; background:#fff9db; color:#e67700;">
                <i class="bi bi-hourglass-split"></i> Teslim Bekleniyor
              </span>
              <span th:if="${sub != null and sub.status.name() == 'SUBMITTED'}"
                    style="padding:0.3rem 0.8rem; border-radius:20px; font-weight:600; background:#fff4e6; color:#e8590c;">
                <i class="bi bi-send-check-fill"></i> İnceleniyor
              </span>
              <span th:if="${sub != null and sub.status.name() == 'GRADED'}"
                    style="padding:0.3rem 0.8rem; border-radius:20px; font-weight:700; background:#d3f9d8; color:#2b8a3e;">
                <i class="bi bi-award-fill"></i> Puan: <span th:text="${sub.score}">0</span>/<span th:text="${sub.assignmentMaxScore}">100</span>
              </span>
            </div>

            <!-- Git Butonu (Hover'da tüm alanı tıklanabilir yapsak da pratiklik için görünür buton) -->
            <a th:href="@{/odevlerim/{id}(id=${a.id})}" class="btn btn-primary" style="width:100%; display:flex; justify-content:center; align-items:center; border-radius:8px; font-size:0.85rem; padding:0.4rem;">
               Ödeve Git <i class="bi bi-arrow-right-short" style="font-size:1.2rem; margin-left:0.2rem;"></i>
            </a>

          </div>

        </div>

      </div>

    </div>
  </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
