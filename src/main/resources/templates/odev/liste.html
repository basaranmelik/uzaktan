<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
  <link rel="icon" type="image/png" th:href="@{/images/gazi-logo.png}">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ödevlerim | Gazi Üniversitesi</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}" th:with="activeMenu='assignments'"></div>

<section class="page-header">
  <div class="container">
    <h1><i class="bi bi-journal-check"></i> Ödevlerim</h1>
    <p>Kayıtlı olduğunuz kurslara ait tüm ödevler.</p>
  </div>
</section>

<section class="section">
  <div class="container">

    <div th:if="${#lists.isEmpty(assignments)}"
         class="text-center" style="padding:4rem;color:var(--text-muted);">
      <div style="font-size:3rem;margin-bottom:1rem;"><i class="bi bi-journal"></i></div>
      <p>Henüz ödev bulunmuyor.</p>
      <a th:href="@{/egitimler}" class="btn btn-primary" style="margin-top:1rem;">Eğitimleri Keşfet →</a>
    </div>

    <div th:if="${!#lists.isEmpty(assignments)}"
         style="display:flex;flex-direction:column;gap:1rem;">

      <div th:each="a : ${assignments}" class="card fade-in" style="padding:1.25rem 1.5rem;">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:0.75rem;">
          <div>
            <div style="font-size:0.8rem;color:var(--text-muted);margin-bottom:0.25rem;"
                 th:text="${a.courseTitle}">Kurs Adı</div>
            <h4 style="margin:0 0 0.25rem;" th:text="${a.title}">Ödev Başlığı</h4>
            <div style="font-size:0.85rem;color:var(--text-muted);">
              Son tarih:
              <span th:text="${#temporals.format(a.dueDate, 'dd.MM.yyyy HH:mm')}"
                    th:style="${a.dueDate.isBefore(#temporals.createNow())} ? 'color:#e03131;font-weight:600;' : 'color:var(--text-muted);'">
                Tarih
              </span>
              &nbsp;·&nbsp; Maks. <span th:text="${a.maxScore}">100</span> puan
            </div>
          </div>

          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:0.5rem;">

            <!-- Teslim durumu rozeti -->
            <span th:with="sub=${submissionByAssignment[a.id]}">
              <span th:if="${sub == null and a.dueDate.isBefore(#temporals.createNow())}"
                    style="padding:0.25rem 0.75rem;border-radius:20px;font-size:0.78rem;font-weight:600;background:#fff5f5;color:#e03131;">
                <i class="bi bi-x-circle-fill"></i> Teslim Edilmedi
              </span>
              <span th:if="${sub == null and !a.dueDate.isBefore(#temporals.createNow())}"
                    style="padding:0.25rem 0.75rem;border-radius:20px;font-size:0.78rem;font-weight:600;background:#fff9db;color:#e67700;">
                <i class="bi bi-hourglass-split"></i> Bekliyor
              </span>
              <span th:if="${sub != null and sub.status.name() == 'SUBMITTED'}"
                    style="padding:0.25rem 0.75rem;border-radius:20px;font-size:0.78rem;font-weight:600;background:#fff4e6;color:#e8590c;">
                <i class="bi bi-send-check-fill"></i> Teslim Edildi
              </span>
              <span th:if="${sub != null and sub.status.name() == 'GRADED'}"
                    style="padding:0.25rem 0.75rem;border-radius:20px;font-size:0.78rem;font-weight:600;background:#d3f9d8;color:#2b8a3e;">
                <i class="bi bi-trophy-fill"></i>
                Notlandı: <span th:text="${sub.score}">0</span> / <span th:text="${sub.assignmentMaxScore}">100</span>
              </span>
            </span>

            <a th:href="@{/odevlerim/{id}(id=${a.id})}"
               class="btn btn-primary" style="padding:0.4rem 1rem;font-size:0.85rem;">
              <i class="bi bi-arrow-right-circle"></i> Görüntüle
            </a>
          </div>
        </div>
      </div>

    </div>
  </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
