# ===== Application =====
spring.application.name=uzaktan

# ===== DataSource =====
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=master;encrypt=true;trustServerCertificate=true;
spring.datasource.username=sa
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# HikariCP connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ===== JPA / Hibernate =====
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.open-in-view=false

# ===== Cache =====
spring.cache.type=caffeine

# ===== Server =====
server.port=8080
server.servlet.session.timeout=30m

# ===== Thymeleaf =====
spring.thymeleaf.cache=false
spring.thymeleaf.servlet.produce-partial-output-while-processing=false

# ===== App Base URL =====
app.base-url=${APP_BASE_URL:http://localhost:8080}

# ===== Mail =====
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:noreply@gazi.edu.tr}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.enabled=${MAIL_ENABLED:false}

# ===== File Upload =====
app.upload.dir=${user.home}/guzem-uploads
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB

# ===== Security =====
app.security.max-login-attempts=5
app.security.lockout-minutes=15

# ===== Zoom =====
zoom.account-id=${ZOOM_ACCOUNT_ID}
zoom.client-id=${ZOOM_CLIENT_ID}
zoom.client-secret=${ZOOM_CLIENT_SECRET}

# ===== Logging =====
logging.level.com.guzem.uzaktan=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=WARN
