services:

  # ── SQL Server (Azure SQL Edge) ──────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: uzaktan-sqlserver
    env_file: .env.docker
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_MEMORY_LIMIT_MB: "1500"
    mem_limit: 2g
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - uzaktan-network
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/1433' 2>/dev/null && echo ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    restart: unless-stopped

  # ── Spring Boot App ──────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uzaktan-app
    depends_on:
      sqlserver:
        condition: service_healthy
    env_file: .env.docker
    environment:
      # JPA
      SPRING_JPA_DATABASE_PLATFORM: "org.hibernate.dialect.SQLServerDialect"
      SPRING_JPA_HIBERNATE_DDL_AUTO: "update"
      SPRING_JPA_SHOW_SQL: "false"

      # Dosya yükleme
      JAVA_TOOL_OPTIONS: "-Dapp.upload.dir=/app/uploads"

      # Uygulama
      APP_BASE_URL: "http://localhost:8080"
      SERVER_PORT: "8080"

      # Loglama
      LOGGING_LEVEL_ROOT: "WARN"
      LOGGING_LEVEL_COM_GUZEM: "INFO"
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY: "INFO"
    ports:
      - "8080:8080"
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    networks:
      - uzaktan-network
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8080' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

volumes:
  sqlserver_data:
    driver: local

networks:
  uzaktan-network:
    driver: bridge
