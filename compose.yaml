services:

  # ── SQL Server (Azure SQL Edge) ──────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: uzaktan-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "verYs3cret"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - uzaktan-network
    healthcheck:
      test: ["CMD", "/opt/mssql-tools/bin/sqlcmd",
             "-S", "localhost", "-U", "sa", "-P", "verYs3cret",
             "-Q", "SELECT 1", "-b"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s
    restart: unless-stopped

  # ── Spring Boot App ──────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uzaktan-app
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      # Veritabanı
      SPRING_DATASOURCE_URL: "jdbc:sqlserver://sqlserver:1433;databaseName=master;encrypt=true;trustServerCertificate=true;"
      SPRING_DATASOURCE_USERNAME: "sa"
      SPRING_DATASOURCE_PASSWORD: "verYs3cret"
      DB_PASSWORD: "verYs3cret"

      # JPA
      SPRING_JPA_DATABASE_PLATFORM: "org.hibernate.dialect.SQLServerDialect"
      SPRING_JPA_HIBERNATE_DDL_AUTO: "update"
      SPRING_JPA_SHOW_SQL: "false"

      # Dosya yükleme
      JAVA_TOOL_OPTIONS: "-Dapp.upload.dir=/app/uploads"

      # Mail (kapalı — açmak istersen MAIL_ENABLED=true yap ve bilgileri gir)
      MAIL_USERNAME: "noreply@gazi.edu.tr"
      MAIL_PASSWORD: "dummy"
      MAIL_ENABLED: "false"

      # Zoom (kapalı — kullanmak istersen doldur)
      ZOOM_ACCOUNT_ID: "dummy"
      ZOOM_CLIENT_ID: "dummy"
      ZOOM_CLIENT_SECRET: "dummy"

      # Uygulama
      APP_BASE_URL: "http://localhost:8080"
      SERVER_PORT: "8080"

      # Loglama
      LOGGING_LEVEL_ROOT: "WARN"
      LOGGING_LEVEL_COM_GUZEM: "INFO"
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY: "INFO"
    ports:
      - "8080:8080"
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    networks:
      - uzaktan-network
    restart: unless-stopped

volumes:
  sqlserver_data:
    driver: local

networks:
  uzaktan-network:
    driver: bridge
